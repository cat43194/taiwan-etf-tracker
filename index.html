<script>
const ETF_META = {
  '00981A': { name: '主動統一台股增長',   issuer: '統一', size: 'top5' },
  '00994A': { name: '主動第一金台股優',   issuer: '第一金', size: 'top5' },

  '00985A': { name: '主動野村台灣50',     issuer: '野村', size: 'top5' },
  '00980A': { name: '主動野村臺灣優選',   issuer: '野村', size: 'mid5' },
  '00991A': { name: '主動復華未來50',     issuer: '復華', size: 'mid5' },
  '00987A': { name: '主動台新優勢成長',   issuer: '台新', size: 'mid5' },
  '00995A': { name: '主動中信台灣卓越',   issuer: '中信', size: 'mid5' },
  '00984A': { name: '主動安聯台灣高息',   issuer: '安聯', size: 'mid5' },
  '00993A': { name: '主動安聯台灣',       issuer: '安聯', size: 'bottom4' },
  '00996A': { name: '主動兆豐台灣豐收',   issuer: '兆豐', size: 'bottom4' },
  '00400A': { name: '主動國泰動能高息',   issuer: '國泰', size: 'bottom4' },
  '00401A': { name: '主動摩根台灣鑫收',   issuer: '摩根', size: 'bottom4' },
  '00999A': { name: '主動野村台灣高息',   issuer: '野村', size: 'bottom4' },
  '00403A': { name: '主動統一升級50',     issuer: '統一', size: 'bottom4' },
  '00405A': { name: '主動富邦台灣龍耀',   issuer: '富邦', size: 'bottom4' },
  '00404A': { name: '主動聯博動能50',     issuer: '聯博', size: null },   // size 分組待定
  '00407A': { name: '主動凱基台灣',       issuer: '凱基', size: null },   // size 分組待定
};

const SIGNAL_THRESHOLDS = { consensusEtfCount: 3, newEtfCount: 2, largeAmountTopN: 3, maxSignals: 5 };

function getEtfsBySize(size) { return Object.keys(ETF_META).filter(k => ETF_META[k].size === size); }
function getEtfsByIssuer(issuer) { return Object.keys(ETF_META).filter(k => ETF_META[k].issuer === issuer); }

const VALID_PASSWORDS = ["RVRGLTQzMTk0","RVRGLTIwMjZBY3RpdmU="];
const AUTH_KEY = 'etf_tracker_auth_v1';
function checkAuth() {
  const saved = localStorage.getItem(AUTH_KEY);
  if (saved && VALID_PASSWORDS.includes(saved)) { showMainSite(); return true; }
  return false;
}
function showMainSite() {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('main-site').classList.remove('hidden');
  loadData();
}
function logout() { localStorage.removeItem(AUTH_KEY); location.reload(); }
document.getElementById('pwd-submit').addEventListener('click', tryLogin);
document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
function tryLogin() {
  const input = document.getElementById('pwd-input').value;
  const encoded = btoa(input);
  if (VALID_PASSWORDS.includes(encoded)) {
    localStorage.setItem(AUTH_KEY, encoded);
    showMainSite();
  } else {
    document.getElementById('pwd-error').classList.remove('hidden');
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}
setTimeout(() => { const inp = document.getElementById('pwd-input'); if (inp) inp.focus(); }, 100);
if (!checkAuth()) {}

const TOP_N_MV = 50, TOP_N_FLOW = 20, TOP_N_OVERVIEW = 20, MULTI_TOP_N = 20;
let DATA = null, currentTab = 'overview', selectedEtf = null, stockSearch = '', selectedStock = null, modalStock = null;
let NEW_ETFS = [];
let selectedEtfMulti = null, etfMultiSelectMode = false;
let HISTORY_DATES = null, HISTORY_CACHE = {};
let multiPreset = '5d', multiStartDate = null, multiEndDate = null;
let multiSubTab = 'buy', multiLoading = false, multiSort = { key: null, dir: null };

// 個股查詢狀態
let stockQueryDate = null, stockQueryLoading = false;
let stockQueryEtfFilter = null;        // null=全部, string=單檔, array=多選
let stockQueryMultiSelectMode = false; // 是否在多選模式中
let stockQueryCustomSelected = [];     // 多選模式中暫存的選擇

// ── 資料更新狀態判斷（與 Python 端一致：取「達 2 檔門檻的最新 holdings_date」）──
function latestHoldingsDate() {
  if (!DATA || !DATA.today) return null;
  const hds = Object.values(DATA.today).map(e => e.holdings_date).filter(Boolean);
  if (!hds.length) return null;
  const THRESH = 2;
  const counts = {};
  hds.forEach(d => { counts[d] = (counts[d] || 0) + 1; });
  const eligible = Object.keys(counts).filter(d => counts[d] >= THRESH);
  return (eligible.length ? eligible : hds).sort().pop(); // YYYY/MM/DD 零補位，字串排序即日期排序
}
function staleEtfCodes() {
  const latest = latestHoldingsDate();
  if (!latest || !DATA || !DATA.today) return [];
  return Object.keys(DATA.today).filter(k => {
    const hd = DATA.today[k].holdings_date;
    return hd && hd < latest;
  });
}

// ── 除權(配股)校正 ─────────────────────────────────────────
// 配股會讓 ETF 張數無交易而跳增, 造成假買超。
// 判定: (1)日曆: 除權日起 45 天窗口內 (配股入帳時點可能延遲)
//       (2)型態確認: 各 ETF 張數跳增比例吻合配股率 ±2% 且 ≥2 檔吻合
//          (僅 1 檔持有時, 該檔吻合即成立)
// 校正: 前日張數 × (1+配股率) 作為比較基準, 校正後仍有差額才是真實買賣。
// 自我終結: 隔日 prev 已含配股後張數, 跳增消失, 不會重複校正。
let EX_ADJ = {};   // code -> { ratio, date }  今日生效的配股校正
let EX_DIV = {};   // code -> { date }         近日除息 (純標註)
function computeExAdjMap(todayEtfs, prevEtfs, events, todayIso) {
  // 通用版除權校正判定: 供「今日 vs 昨日」與「歷史任兩日」共用
  const map = {};
  if (!todayEtfs || !events || !events.length || !todayIso) return map;
  events.forEach(function(ev) {
    if (!ev || !ev.code || !ev.date || !(ev.stock_ratio > 0)) return;
    const dayGap = (new Date(todayIso) - new Date(ev.date)) / 86400000;
    if (dayGap < 0 || dayGap > 45) return;
    const r = ev.stock_ratio;
    let rows = 0, matches = 0;
    Object.keys(todayEtfs).forEach(function(k) {
      const th = ((todayEtfs[k] || {}).holdings || []).find(h => h.code === ev.code);
      const ph = (((prevEtfs || {})[k] || {}).holdings || []).find(h => h.code === ev.code);
      if (!th || !ph || !ph.lots) return;
      rows++;
      const jump = th.lots / ph.lots;
      if (jump > 1 && Math.abs(jump - (1 + r)) <= 0.02 * (1 + r)) matches++;
    });
    if (matches >= 2 || (rows === 1 && matches === 1)) map[ev.code] = { ratio: r, date: ev.date };
  });
  return map;
}
function buildExAdjustments() {
  EX_ADJ = {}; EX_DIV = {};
  if (!DATA || !DATA.today) return;
  const events = DATA.ex_events || [];
  const todayIso = DATA.today_date;
  if (!events.length || !todayIso) return;
  EX_ADJ = computeExAdjMap(DATA.today, DATA.prev || {}, events, todayIso);
  events.forEach(function(ev) {
    if (!ev || !ev.code || !ev.date || ev.stock_ratio > 0) return;
    const dayGap = (new Date(todayIso) - new Date(ev.date)) / 86400000;
    if (dayGap >= 0 && dayGap <= 2) EX_DIV[ev.code] = { date: ev.date };
  });
}
function exAdjPrev(code, prevLots) {
  const a = EX_ADJ[code];
  return (a && prevLots) ? Math.round(prevLots * (1 + a.ratio)) : prevLots;
}
function exTagHtml(code) {
  if (EX_ADJ[code]) return ' <span class="text-[10px] bg-violet-600/30 text-violet-300 px-1 rounded ml-1" title="配股 ' + (EX_ADJ[code].ratio * 100).toFixed(2) + '%（除權日 ' + esc(EX_ADJ[code].date) + '），增減已校正配股虛增">⚙️除權調整</span>';
  if (EX_DIV[code]) return ' <span class="text-[10px] bg-slate-600/40 text-slate-300 px-1 rounded ml-1" title="除息日 ' + esc(EX_DIV[code].date) + '，張數不受影響，僅供參考">除息</span>';
  return '';
}
function exEventsInRange(startIso, endIso) {
  if (!DATA || !DATA.ex_events) return [];
  return DATA.ex_events.filter(ev => ev && ev.stock_ratio > 0 && ev.date > startIso && ev.date <= endIso);
}

// ── AUM(規模)內生估算 + 吸金/換股拆解 ──────────────────────
// AUM 估計 = 股票部位市值 ÷ (權重合計/100)。權重合計含期貨等非股票部位。
// 吸金因子 s = 今日估計AUM ÷ 昨日持股「以今日價」重估之AUM (排除漲跌因素)
//   s>1: 淨申購(吸金), 持股等比放大非經理人意圖; s<1: 淨贖回。
// 主動買賣 = 今日張數 − round(除權校正後前日張數 × s) → 剝離配股與申贖後的真實決策。
let AUM_STATS = {};   // etfCode -> { aum, cashPct, weightSum, s, netFlowPct } | null
let flowAumFilter = 0;  // 買賣超規模門檻 (億); 0 = 全部
function sleeveStats(etfObj, prices) {
  let mv = 0, wsum = 0;
  ((etfObj && etfObj.holdings) || []).forEach(function(h) {
    const p = prices[h.code];
    if (p != null && h.lots) mv += h.lots * 1000 * p;
    if (h.weight) wsum += h.weight;
  });
  ((etfObj && etfObj.non_stock_positions) || []).forEach(function(p) { wsum += (p.weight || 0); });
  return { mv, wsum: Math.min(wsum, 100) };
}
function buildAumStats() {
  AUM_STATS = {};
  if (!DATA || !DATA.today) return;
  const prices = DATA.prices || {};
  Object.keys(DATA.today).forEach(function(k) {
    const t = sleeveStats(DATA.today[k], prices);
    if (!t.mv || t.wsum < 30) { AUM_STATS[k] = null; return; }  // 資料不足不硬算
    const aum = t.mv / (t.wsum / 100);
    let s = null, netFlowPct = null;
    const prevEtf = (DATA.prev || {})[k];
    if (prevEtf && NEW_ETFS.indexOf(k) === -1) {
      const p0 = sleeveStats(prevEtf, prices);  // 昨日持股 × 今日價
      if (p0.mv && p0.wsum >= 30) {
        const aum0 = p0.mv / (p0.wsum / 100);
        const raw = aum / aum0;
        if (raw >= 0.5 && raw <= 2) { s = raw; netFlowPct = (raw - 1) * 100; }  // 異常防呆
      }
    }
    AUM_STATS[k] = { aum, cashPct: Math.max(0, 100 - t.wsum), weightSum: t.wsum, s, netFlowPct };
  });
}
function etfFlowS(etfCode) {
  const st = AUM_STATS[etfCode];
  if (!st || !st.s) return 1;
  return Math.abs(st.s - 1) < 0.003 ? 1 : st.s;  // 申贖<0.3% 視為持平, 避免主動欄出現整排雜訊
}
function activeDiffFor(etfCode, code, prevLots, todayLots) {
  return todayLots - Math.round(exAdjPrev(code, prevLots) * etfFlowS(etfCode));
}
function setFlowAumFilter(v) { flowAumFilter = v; render(); }

// ── 趨勢分頁: 現金水位時間序列 + 連買/連賣天數 ──────────────
// 資料: 複用 HISTORY_CACHE (discoverHistoryDates 已載入全部歷史快照)
// 現金% = 100 − 權重合計(含非股票部位); 全體線以估計AUM加權, 排除上市未滿30天新ETF
// 連買判定: 逐日「主動買賣」(每日各自套用當日除權校正+吸金因子);
//   同向→累加; 淨額<門檻視為中斷, 中斷1天不斷鏈、第2天歸零; 反向即斷。
let TREND_STATS = null, trendLoading = false, trendSelectedEtfs = [];
const STREAK_MIN_LOTS = 10;       // 單日合計主動淨額低於此張數視為「無動作」
const TREND_COLORS = ['#f59e0b', '#34d399', '#f472b6', '#a78bfa', '#fb7185', '#22d3ee'];

function trendSleeve(etfObj, prices) {
  let mv = 0, wsum = 0;
  ((etfObj && etfObj.holdings) || []).forEach(function(h) {
    const p = prices[h.code];
    if (p != null && h.lots) mv += h.lots * 1000 * p;
    if (h.weight) wsum += h.weight;
  });
  ((etfObj && etfObj.non_stock_positions) || []).forEach(function(p) { wsum += (p.weight || 0); });
  return { mv, wsum: Math.min(wsum, 100) };
}

function computeTrends() {
  const datesAsc = [...HISTORY_DATES].sort();
  const cashSeries = {};
  const avgSeries = [];
  const firstSeen = {};
  datesAsc.forEach(d => {
    const S = HISTORY_CACHE[d]; if (!S || !S.today) return;
    Object.keys(S.today).forEach(k => { if (!firstSeen[k]) firstSeen[k] = d; });
  });
  const dayMs = 86400000;
  datesAsc.forEach(function(d) {
    const S = HISTORY_CACHE[d]; if (!S || !S.today) return;
    const prices = S.prices || {};
    let wSum = 0, wCash = 0, n = 0;
    Object.keys(S.today).forEach(function(k) {
      const st = trendSleeve(S.today[k], prices);
      if (!st.mv || st.wsum < 30) return;
      const cash = Math.max(0, 100 - st.wsum), aum = st.mv / (st.wsum / 100);
      (cashSeries[k] = cashSeries[k] || []).push({ date: d, pct: cash });
      const isYoung = firstSeen[k] > datesAsc[0] && (new Date(d) - new Date(firstSeen[k])) / dayMs < 30;
      if (!isYoung) { wSum += aum; wCash += aum * cash; n++; }
    });
    if (wSum > 0) avgSeries.push({ date: d, pct: wCash / wSum, n });
  });
  const streakState = {};
  const recentNets = [];
  for (let i = 1; i < datesAsc.length; i++) {
    const dp = datesAsc[i - 1], d = datesAsc[i];
    const Sp = HISTORY_CACHE[dp], S = HISTORY_CACHE[d];
    if (!S || !S.today || !Sp || !Sp.today) continue;
    const prices = S.prices || {};
    const exMap = computeExAdjMap(S.today, Sp.today, S.ex_events || [], d);
    const dayNet = {}, nameOf = {};
    Object.keys(S.today).forEach(function(k) {
      const cur = S.today[k], prev = Sp.today[k];
      if (!prev) return;
      const t = trendSleeve(cur, prices), p0 = trendSleeve(prev, prices);
      let s = 1;
      if (t.mv && t.wsum >= 30 && p0.mv && p0.wsum >= 30) {
        const raw = (t.mv / (t.wsum / 100)) / (p0.mv / (p0.wsum / 100));
        if (raw >= 0.5 && raw <= 2 && Math.abs(raw - 1) >= 0.003) s = raw;
      }
      const prevMap = {};
      (prev.holdings || []).forEach(h => { prevMap[h.code] = h.lots; });
      (cur.holdings || []).forEach(function(h) {
        let base = prevMap[h.code] || 0;
        if (exMap[h.code]) base = Math.round(base * (1 + exMap[h.code].ratio));
        dayNet[h.code] = (dayNet[h.code] || 0) + (h.lots - Math.round(base * s));
        nameOf[h.code] = h.name;
        delete prevMap[h.code];
      });
      Object.keys(prevMap).forEach(function(code) {
        let base = prevMap[code];
        if (exMap[code]) base = Math.round(base * (1 + exMap[code].ratio));
        dayNet[code] = (dayNet[code] || 0) - Math.round(base * s);
      });
    });
    recentNets.push(dayNet);
    Object.keys(dayNet).forEach(function(code) {
      const net = dayNet[code];
      const st = streakState[code] || { dir: 0, len: 0, gap: 0, cum: 0, name: nameOf[code] || code };
      if (nameOf[code]) st.name = nameOf[code];
      if (Math.abs(net) < STREAK_MIN_LOTS) {
        if (st.len > 0) { st.gap++; if (st.gap >= 2) { st.dir = 0; st.len = 0; st.cum = 0; st.gap = 0; } }
      } else {
        const dir = net > 0 ? 1 : -1;
        if (dir === st.dir) { st.len++; st.cum += net; st.gap = 0; }
        else { st.dir = dir; st.len = 1; st.cum = net; st.gap = 0; }
      }
      streakState[code] = st;
    });
    Object.keys(streakState).forEach(function(code) {
      if (dayNet[code] === undefined) {
        const st = streakState[code];
        if (st.len > 0) { st.gap++; if (st.gap >= 2) { st.dir = 0; st.len = 0; st.cum = 0; st.gap = 0; } }
      }
    });
  }
  const last10 = recentNets.slice(-10);
  const sum10 = {};
  last10.forEach(dn => Object.keys(dn).forEach(c => { sum10[c] = (sum10[c] || 0) + dn[c]; }));
  const prices = (DATA && DATA.prices) || {};
  const rows = Object.keys(streakState).map(function(code) {
    const st = streakState[code], p = prices[code];
    return { code, name: st.name, dir: st.dir, len: st.len, cum: st.cum, sum10: sum10[code] || 0,
      value10: p != null ? (sum10[code] || 0) * 1000 * p : null };
  });
  return {
    datesAsc, cashSeries, avgSeries,
    buyStreaks: rows.filter(r => r.dir > 0 && r.len >= 3).sort((a, b) => b.len - a.len || b.cum - a.cum).slice(0, 15),
    sellStreaks: rows.filter(r => r.dir < 0 && r.len >= 3).sort((a, b) => b.len - a.len || a.cum - b.cum).slice(0, 15),
  };
}

function buildCashChart(ts) {
  const avg = ts.avgSeries;
  if (!avg || avg.length < 2) return '<div class="text-xs text-slate-500">歷史資料不足，無法繪製曲線</div>';
  const W = 720, H = 240, L = 42, R = 8, T = 12, B = 28;
  const series = [{ label: '全體加權', color: '#38bdf8', bold: true, pts: avg.map(a => ({ date: a.date, v: a.pct })) }];
  trendSelectedEtfs.forEach(function(k, i) {
    const cs = ts.cashSeries[k];
    if (cs && cs.length >= 2) series.push({ label: k, color: TREND_COLORS[i % TREND_COLORS.length], bold: false, pts: cs.map(a => ({ date: a.date, v: a.pct })) });
  });
  const allV = series.flatMap(s => s.pts.map(p => p.v));
  const mean = avg.reduce((s, a) => s + a.pct, 0) / avg.length;
  const sd = Math.sqrt(avg.reduce((s, a) => s + (a.pct - mean) * (a.pct - mean), 0) / avg.length);
  let vMin = Math.min(...allV, mean - sd), vMax = Math.max(...allV, mean + sd);
  const pad = Math.max((vMax - vMin) * 0.1, 0.3); vMin = Math.max(0, vMin - pad); vMax += pad;
  const dates = ts.datesAsc;
  const x = d => L + (dates.indexOf(d) / Math.max(dates.length - 1, 1)) * (W - L - R);
  const y = v => T + (1 - (v - vMin) / (vMax - vMin)) * (H - T - B);
  let g = '';
  for (let i = 0; i <= 4; i++) {
    const v = vMin + (vMax - vMin) * i / 4, yy = y(v);
    g += '<line x1="' + L + '" y1="' + yy + '" x2="' + (W - R) + '" y2="' + yy + '" stroke="#1e293b" stroke-width="1"/><text x="' + (L - 5) + '" y="' + (yy + 3) + '" text-anchor="end" font-size="9" fill="#64748b">' + v.toFixed(1) + '%</text>';
  }
  [[mean, '#94a3b8', '均值'], [mean + sd, '#f59e0b', '+1σ'], [mean - sd, '#f59e0b', '-1σ']].forEach(function(m) {
    g += '<line x1="' + L + '" y1="' + y(m[0]) + '" x2="' + (W - R) + '" y2="' + y(m[0]) + '" stroke="' + m[1] + '" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/><text x="' + (W - R - 2) + '" y="' + (y(m[0]) - 3) + '" text-anchor="end" font-size="8" fill="' + m[1] + '">' + m[2] + '</text>';
  });
  const xticks = Math.min(6, dates.length);
  for (let i = 0; i < xticks; i++) {
    const di = Math.round(i * (dates.length - 1) / Math.max(xticks - 1, 1));
    g += '<text x="' + x(dates[di]) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="8" fill="#64748b">' + dates[di].slice(5) + '</text>';
  }
  series.forEach(function(s) {
    const path = s.pts.map((p, i) => (i ? 'L' : 'M') + x(p.date).toFixed(1) + ',' + y(p.v).toFixed(1)).join(' ');
    g += '<path d="' + path + '" fill="none" stroke="' + s.color + '" stroke-width="' + (s.bold ? 2.2 : 1.4) + '" opacity="' + (s.bold ? 1 : 0.85) + '"/>';
  });
  const legend = series.map(s => '<span class="inline-flex items-center gap-1 mr-3"><span style="background:' + s.color + '" class="inline-block w-3 h-0.5 rounded"></span><span class="text-xs text-slate-400">' + esc(s.label) + '</span></span>').join('');
  const latest = avg[avg.length - 1];
  const zone = latest.pct > mean + sd ? '<span class="text-amber-300">偏高(保守)</span>' : (latest.pct < mean - sd ? '<span class="text-emerald-300">偏低(積極)</span>' : '<span class="text-slate-300">正常區間</span>');
  return '<div class="text-xs text-slate-400 mb-1">最新全體加權現金水位 <span class="font-semibold text-sky-300">' + latest.pct.toFixed(2) + '%</span>（期間均值 ' + mean.toFixed(2) + '% ± ' + sd.toFixed(2) + '）· 位置: ' + zone + '</div><svg viewBox="0 0 ' + W + ' ' + H + '" class="w-full" style="max-height:280px">' + g + '</svg><div class="mt-1">' + legend + '</div>';
}

    + '<div class="grid sm:grid-cols-2 gap-3 sm:gap-4">' + streakTable(ts.buyStreaks, '連續加碼榜', '🔥', true) + streakTable(ts.sellStreaks, '連續減碼榜', '🧊', false) + '</div>';

function fmt(n, d) {
  d = d || 0;
  if (n == null || isNaN(n)) return '-';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function fmtM(n) {
  if (n == null || isNaN(n)) return '-';
  if (Math.abs(n) >= 1e8) return (n / 1e8).toFixed(1) + '億';
  if (Math.abs(n) >= 1e4) return Math.round(n / 1e4) + '萬';
  return fmt(n);
}
function esc(s) {
  if (s == null) return '';
  return String(s).split('&').join('&amp;').split('<').join('&lt;').split('>').join('&gt;').split('"').join('&quot;').split("'").join('&#39;');
}
function rankChangeHtml(todayRank, prevRank) {
  if (prevRank == null) return '<span class="text-amber-400 text-xs font-semibold ml-1">NEW</span>';

  if (diff < 0) return '<span class="text-emerald-400 text-xs ml-1">↓' + Math.abs(diff) + '</span>';
  return '<span class="text-slate-500 text-xs ml-1">—</span>';
}
function cycleSort(current, key) {
  if (current.key !== key) return { key: key, dir: 'desc' };
  if (current.dir === 'desc') return { key: key, dir: 'asc' };
  if (current.dir === 'asc') return { key: null, dir: null };
  return { key: key, dir: 'desc' };
}
function sortRows(rows, sortState, keyMap) {
  if (!sortState.key || !sortState.dir) return rows;
  const getter = keyMap[sortState.key];
  if (!getter) return rows;
  const sign = sortState.dir === 'desc' ? -1 : 1;
  return [...rows].sort(function(a, b) {
    const va = getter(a), vb = getter(b);
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') return sign * va.localeCompare(vb, 'zh-Hant');
    return sign * (va - vb);
  });
}
function sortIcon(sortState, key) {
  if (sortState.key !== key) return '<span class="text-slate-600 ml-0.5">⇅</span>';
  return sortState.dir === 'desc' ? '<span class="text-amber-400 ml-0.5">▼</span>' : '<span class="text-amber-400 ml-0.5">▲</span>';
}

function computeConcentration(holdings) {
  if (!holdings || !holdings.length) return null;
  const totalLots = holdings.reduce((s, h) => s + (h.lots || 0), 0);
  if (!totalLots) return null;
  const sorted = [...holdings].sort((a, b) => (b.lots || 0) - (a.lots || 0));
  const top10Lots = sorted.slice(0, 10).reduce((s, h) => s + (h.lots || 0), 0);
  const top10Pct = (top10Lots / totalLots) * 100;
  const hhi = sorted.reduce((s, h) => { const pct = (h.lots / totalLots) * 100; return s + pct * pct; }, 0);
  let level, color;
  if (hhi < 1500) { level = '分散'; color = 'emerald'; }
  else if (hhi < 2500) { level = '中度集中'; color = 'amber'; }
  else { level = '高度集中'; color = 'rose'; }
  return { top10Pct, hhi, count: holdings.length, level, color };
}

function generateDailySignals(todayAgg, prevAgg, newEtfs) {
  const signals = [];
  if (!DATA || !DATA.prev) return signals;
  const stockChangeMap = {};
  Object.values(todayAgg).forEach(function(s) {
    let etfsBuying = [], etfsSelling = [];
    s.etfs.forEach(function(e) {
      if (newEtfs.indexOf(e.etf) !== -1) return;
      const prevEtfHoldings = (DATA.prev && DATA.prev[e.etf] && DATA.prev[e.etf].holdings) || [];
      const prevHolding = prevEtfHoldings.find(h => h.code === s.code);
      const prevLots = prevHolding ? exAdjPrev(s.code, prevHolding.lots) : 0;  // 除權校正
      const diff = e.lots - prevLots;
      const isFirstDay = !prevHolding && e.lots > 0;
      if (diff > 0) etfsBuying.push({ etf: e.etf, etfName: e.etf_name, diff, lots: e.lots, isFirstDay });
      else if (diff < 0) etfsSelling.push({ etf: e.etf, etfName: e.etf_name, diff, lots: e.lots });
    });
    if (etfsBuying.length || etfsSelling.length) {
      const netDiff = etfsBuying.reduce((sum, e) => sum + e.diff, 0) + etfsSelling.reduce((sum, e) => sum + e.diff, 0);
      stockChangeMap[s.code] = { code: s.code, name: s.name, price: s.price, etfsBuying, etfsSelling, netDiff };
    }
  });
  Object.values(stockChangeMap).forEach(function(s) {
    if (s.etfsBuying.length >= SIGNAL_THRESHOLDS.consensusEtfCount) {
      const totalDiff = s.etfsBuying.reduce((sum, e) => sum + e.diff, 0);
      signals.push({ type: 'consensus_buy', priority: 200 + s.etfsBuying.length * 10, icon: '🎯', color: 'emerald',
        text: '<b>' + esc(s.name) + '</b> (' + esc(s.code) + ') 今日共 <b class="text-emerald-300">' + s.etfsBuying.length + ' 檔 ETF 同步加碼</b>，合計 <b>+' + fmt(totalDiff) + '</b> 張', stock: s.code });
    }
    if (s.etfsSelling.length >= SIGNAL_THRESHOLDS.consensusEtfCount) {
      const totalDiff = s.etfsSelling.reduce((sum, e) => sum + e.diff, 0);
      signals.push({ type: 'consensus_sell', priority: 200 + s.etfsSelling.length * 10, icon: '⚠️', color: 'rose',
        text: '<b>' + esc(s.name) + '</b> (' + esc(s.code) + ') 今日共 <b class="text-rose-300">' + s.etfsSelling.length + ' 檔 ETF 同步減碼</b>，合計 <b>' + fmt(totalDiff) + '</b> 張', stock: s.code });
    }
  });
  Object.values(stockChangeMap).forEach(function(s) {
    const newEntries = s.etfsBuying.filter(e => e.isFirstDay);
    if (newEntries.length >= SIGNAL_THRESHOLDS.newEtfCount) {
      const totalLots = newEntries.reduce((sum, e) => sum + e.lots, 0);
      signals.push({ type: 'new_entry', priority: 150 + newEntries.length * 5, icon: '🆕', color: 'sky',
        text: '<b>' + esc(s.name) + '</b> (' + esc(s.code) + ') 今日 <b class="text-sky-300">' + newEntries.length + ' 檔 ETF 新進持股</b> (+' + fmt(totalLots) + ' 張)', stock: s.code });
    }
  });
  const sortedByValue = Object.values(stockChangeMap)
    .filter(s => s.price && s.netDiff !== 0)
    .map(s => Object.assign({}, s, { valueChange: s.netDiff * 1000 * s.price }))
    .sort((a, b) => Math.abs(b.valueChange) - Math.abs(a.valueChange))
    .slice(0, SIGNAL_THRESHOLDS.largeAmountTopN);
  sortedByValue.forEach(function(s, i) {
    const dir = s.netDiff > 0 ? '加碼' : '減碼';
    const sign = s.netDiff > 0 ? '+' : '';
    const valueSign = s.valueChange > 0 ? '+' : '';
    signals.push({ type: 'large_amount', priority: 100 - i * 10, icon: '💥', color: s.netDiff > 0 ? 'emerald' : 'rose',
      text: '<b>' + esc(s.name) + '</b> (' + esc(s.code) + ') 大額' + dir + ' <b>' + sign + fmt(s.netDiff) + '</b> 張 <span class="opacity-80">(變動金額 ' + valueSign + fmtM(s.valueChange) + ')</span>', stock: s.code });
  });
  signals.sort((a, b) => b.priority - a.priority);
  const seen = new Set(), dedupe = [];
  signals.forEach(sig => { if (sig.stock && seen.has(sig.stock)) return; if (sig.stock) seen.add(sig.stock); dedupe.push(sig); });
  return dedupe.slice(0, SIGNAL_THRESHOLDS.maxSignals);
}

async function discoverHistoryDates() {
  if (HISTORY_DATES) return HISTORY_DATES;
  if (!DATA || !DATA.today_date) return [];
  const dates = [];
  const todayStr = DATA.today_date;
  const parts = todayStr.split('-');
  const todayObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  dates.push(todayStr);
  HISTORY_CACHE[todayStr] = { today: DATA.today, prev: DATA.prev, prices: DATA.prices, today_date: DATA.today_date };
  function formatLocalDate(d) {
    const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }
  const probes = [];
  for (let i = 1; i <= 90; i++) {
    const d = new Date(todayObj); d.setDate(d.getDate() - i); probes.push(formatLocalDate(d));
  }
  const results = await Promise.allSettled(probes.map(ds =>
    fetch('./snapshots/snapshot-' + ds + '.json?t=' + Date.now())
      .then(r => r.ok ? r.json().then(j => ({ ds, j })) : null).catch(() => null)
  ));
  results.forEach(r => { if (r.status === 'fulfilled' && r.value) { dates.push(r.value.ds); HISTORY_CACHE[r.value.ds] = r.value.j; } });
  dates.sort((a, b) => b.localeCompare(a));
  HISTORY_DATES = [...new Set(dates)];
  return HISTORY_DATES;
}

function getStartDateByOffset(n) {

}

}

function computeMultiFlow(startSnap, endSnap, prices) {

  const startAgg = aggregate(startSnap.today || {}, prices);

    const diff = end_lots - start_lots, price = prices[code] != null ? prices[code] : null;
    flows.push({ code, name: (e && e.name) || (s && s.name) || code, start_lots, end_lots, diff, price,
      diff_value: price ? diff * 1000 * price : null, etf_count: e ? e.etf_count : 0,
      is_new: start_lots === 0 && end_lots > 0, is_cleared: start_lots > 0 && end_lots === 0 });
  });
  return flows;
}

function aggregate(snapshot, prices) {
  const map = {};
  Object.entries(snapshot || {}).forEach(function([etfCode, etf]) {
    (etf.holdings || []).forEach(function(h) {
      if (!map[h.code]) map[h.code] = { code: h.code, name: h.name, total_lots: 0, etfs: [] };
      map[h.code].total_lots += (h.lots || 0);
      map[h.code].etfs.push({ etf: etfCode, etf_name: etf.name, lots: h.lots, weight: h.weight });
    });
  });
  Object.values(map).forEach(s => {
    s.price = prices[s.code] != null ? prices[s.code] : null;
    s.market_value = s.price ? s.total_lots * 1000 * s.price : null;
    s.etf_count = s.etfs.length;
  });
  return map;
}
function buildPrevRankMap(prevAgg, sortKey) {
  const sorted = Object.values(prevAgg).filter(s => s[sortKey] != null && s[sortKey] !== 0).sort((a, b) => b[sortKey] - a[sortKey]);
  const map = {}; sorted.forEach((s, i) => { map[s.code] = i + 1; }); return map;
}
function detectNewEtfs(todaySnap, prevSnap) {
  const todayKeys = new Set(Object.keys(todaySnap || {})), prevKeys = new Set(Object.keys(prevSnap || {}));
  if (prevKeys.size === 0) return [];
  const added = []; todayKeys.forEach(k => { if (!prevKeys.has(k)) added.push(k); }); return added;
}
function computeFlows(todaySnap, prevSnap, prices, newEtfs) {
  const filteredTodaySnap = {};
  Object.entries(todaySnap || {}).forEach(([etfCode, etf]) => { if (newEtfs.indexOf(etfCode) === -1) filteredTodaySnap[etfCode] = etf; });
  const filteredTodayAgg = aggregate(filteredTodaySnap, prices);
  const prevAgg = aggregate(prevSnap, prices);
  const todayAggFull = aggregate(todaySnap, prices);
  const keys = new Set([...Object.keys(filteredTodayAgg), ...Object.keys(prevAgg)]);
  const flows = [];
  keys.forEach(function(code) {
    const t = filteredTodayAgg[code], p = prevAgg[code];
    const today_lots = t ? t.total_lots : 0, prev_lots = p ? p.total_lots : 0;
    const adj_prev = exAdjPrev(code, prev_lots);   // 除權(配股)校正基準
    const diff = today_lots - adj_prev;
    const price = prices[code] != null ? prices[code] : null;
    flows.push({ code, name: (t && t.name) || (p && p.name) || (todayAggFull[code] && todayAggFull[code].name) || code,
      today_lots, prev_lots, diff, diff_pct: adj_prev > 0 ? (diff / adj_prev) * 100 : (today_lots > 0 ? 999 : 0),
      price, diff_value: price ? diff * 1000 * price : null, ex_adj: !!EX_ADJ[code],
      etf_count: todayAggFull[code] ? todayAggFull[code].etf_count : 0,
      has_new_etf: (todayAggFull[code] ? todayAggFull[code].total_lots : 0) !== today_lots });
  });
  return flows;
}

  const sorted = sortRows(rows, sortState, keyMap);
  function thFlow(lab, key, align) { const a = align || 'right'; return '<th class="px-2 py-2 text-' + a + ' sort-th" onclick="toggleFlowSort(\'' + dir + '\',\'' + key + '\')">' + esc(lab) + sortIcon(sortState, key) + '</th>'; }

function renderCustomDatePicker() {
  if (!HISTORY_DATES || HISTORY_DATES.length === 0) return '';
  const minDate = HISTORY_DATES[HISTORY_DATES.length - 1], maxDate = HISTORY_DATES[0];
  const startVal = multiStartDate || minDate, endVal = multiEndDate || maxDate;
  const snappedStart = snapToHistoryDate(startVal), snappedEnd = snapToHistoryDate(endVal);
  const startNote = (snappedStart && snappedStart !== startVal) ? ' <span class="text-amber-400">→ 對齊至 ' + esc(snappedStart) + '</span>' : '';
  const endNote = (snappedEnd && snappedEnd !== endVal) ? ' <span class="text-amber-400">→ 對齊至 ' + esc(snappedEnd) + '</span>' : '';
  return '<div class="flex flex-wrap items-center gap-2 mb-3 text-sm"><label class="text-slate-400">起日:</label><input type="date" min="' + esc(minDate) + '" max="' + esc(maxDate) + '" value="' + esc(startVal) + '" onchange="setMultiCustomDate(\'start\', this.value)" class="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-slate-100 text-xs">' + startNote + '<label class="text-slate-400 ml-2">迄日:</label><input type="date" min="' + esc(minDate) + '" max="' + esc(maxDate) + '" value="' + esc(endVal) + '" onchange="setMultiCustomDate(\'end\', this.value)" class="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-slate-100 text-xs">' + endNote + '<span class="text-xs text-slate-500 ml-2">(可用 ' + HISTORY_DATES.length + ' 天歷史: ' + esc(minDate) + ' ~ ' + esc(maxDate) + ')</span></div>';
}

function getMultiRange() {
  if (!HISTORY_DATES || HISTORY_DATES.length < 2) return { validRange: false };
  const endDate = HISTORY_DATES[0];
  let startDate;
  if (multiPreset === '1d') startDate = getStartDateByOffset(1);
  else if (multiPreset === '2d') startDate = getStartDateByOffset(2);
  else if (multiPreset === '3d') startDate = getStartDateByOffset(3);
  else if (multiPreset === '4d') startDate = getStartDateByOffset(4);
  else if (multiPreset === '5d') startDate = getStartDateByOffset(5);
  else if (multiPreset === 'mtd') {
    // 本月：從本月第一個交易日到最新日
    const parts = endDate.split('-');
    const monthStartStr = parts[0] + '-' + parts[1] + '-01';
    startDate = snapToHistoryDate(monthStartStr);
    if (startDate === endDate && HISTORY_DATES.length > 1) startDate = HISTORY_DATES[1];
  }
  else if (multiPreset === 'lastm') {
    // 上月：從上月第一個交易日到上月最後一個交易日
    const parts = endDate.split('-');
    const cy = parseInt(parts[0]), cm = parseInt(parts[1]);
    const ly = cm === 1 ? cy - 1 : cy, lm = cm === 1 ? 12 : cm - 1;
    const currentMonthStart = parts[0] + '-' + parts[1] + '-01';
    const lastMonthStartStr = ly + '-' + String(lm).padStart(2, '0') + '-01';
    // 上月最後交易日：HISTORY_DATES 中第一個 < currentMonthStart 的
    let lastMonthEnd = null;
    for (let i = 0; i < HISTORY_DATES.length; i++) {
      if (HISTORY_DATES[i] < currentMonthStart) { lastMonthEnd = HISTORY_DATES[i]; break; }
    }
    if (!lastMonthEnd) return { validRange: false };
    // 上月第一個交易日：HISTORY_DATES 中最早的 >= lastMonthStartStr 且 < currentMonthStart
    let lastMonthStart = null;
    for (let i = HISTORY_DATES.length - 1; i >= 0; i--) {
      if (HISTORY_DATES[i] >= lastMonthStartStr && HISTORY_DATES[i] < currentMonthStart) lastMonthStart = HISTORY_DATES[i];
    }
    if (!lastMonthStart || lastMonthStart >= lastMonthEnd) return { validRange: false };
    return { startDate: lastMonthStart, endDate: lastMonthEnd, validRange: true };
  }
  else if (multiPreset === 'custom') {
    if (!multiStartDate || !multiEndDate || multiStartDate >= multiEndDate) return { validRange: false };
    const snappedStart = snapToHistoryDate(multiStartDate), snappedEnd = snapToHistoryDate(multiEndDate);
    if (!snappedStart || !snappedEnd || snappedStart >= snappedEnd) return { validRange: false };
    return { startDate: snappedStart, endDate: snappedEnd, validRange: true };
  } else startDate = getStartDateByOffset(1);
  if (!startDate || startDate === endDate) return { validRange: false };
  return { startDate, endDate, validRange: true };
}

function renderMultiPeriodInfo() {
  if (!HISTORY_DATES || HISTORY_DATES.length < 2) return '';
  const range = getMultiRange();
  if (!range.validRange) {
    let hintText = '⚠️ 請選擇有效的日期區間';

  const tradingDays = (startIdx >= 0 && endIdx >= 0) ? Math.abs(startIdx - endIdx) + 1 : '?';

}

function renderETF() {
  const etfKeys = Object.keys(DATA.today);
  const isMulti = !!(selectedEtfMulti && selectedEtfMulti.length > 1);
  if (!isMulti) { if (!selectedEtf || !DATA.today[selectedEtf]) selectedEtf = etfKeys[0]; }
  let displayName, displayCode, displayHoldingsDate, isNewEtf, rawRows, totalMV, etfsInScope;
  if (isMulti) {
    etfsInScope = selectedEtfMulti.filter(k => DATA.today[k]);
    displayCode = '自選 ' + etfsInScope.length + ' 檔'; displayName = '組合: ' + etfsInScope.join(', ');
    displayHoldingsDate = null; isNewEtf = false;
    const merged = {};
    etfsInScope.forEach(k => {
      const etfData = DATA.today[k]; if (!etfData) return;
      const prevMap = {}; ((DATA.prev && DATA.prev[k] && DATA.prev[k].holdings) || []).forEach(h => { prevMap[h.code] = h.lots; });
      const isThisNew = NEW_ETFS.indexOf(k) !== -1;
      (etfData.holdings || []).forEach(h => {
        if (!merged[h.code]) merged[h.code] = { code: h.code, name: h.name, lots: 0, prev_lots: 0, active: 0, weight_sum: 0, etf_count: 0, etfs: [], has_new_etf: false };
        merged[h.code].lots += h.lots;
        merged[h.code].prev_lots += isThisNew ? h.lots : (prevMap[h.code] || 0);
        merged[h.code].active += isThisNew ? 0 : activeDiffFor(k, h.code, prevMap[h.code] || 0, h.lots);
        merged[h.code].weight_sum += (h.weight || 0);
        merged[h.code].etf_count += 1; merged[h.code].etfs.push(k);
        if (isThisNew) merged[h.code].has_new_etf = true;

  // ── 資料查詢 ──
  const queryData = getStockQuerySnap(stockQueryDate);
  let querySnapshot, queryPrices, queryDateLabel, queryPrevSnapshot, queryPrevLabel;
  if (queryData) {
    querySnapshot = queryData.snap.today || {}; queryPrices = queryData.snap.prices || {};
    queryDateLabel = stockQueryDate || DATA.today_date;
    queryPrevSnapshot = (queryData.prevSnap && queryData.prevSnap.today) || {}; queryPrevLabel = queryData.prevDate;
  } else {
    querySnapshot = DATA.today || {}; queryPrices = DATA.prices || {};
    queryDateLabel = DATA.today_date; queryPrevSnapshot = DATA.prev || {}; queryPrevLabel = DATA.prev_date;
  }
  let activeEtfCodes = isAll ? null : (isSingleFilter ? [stockQueryEtfFilter] : (isMultiFilter ? stockQueryEtfFilter : null));
  let filteredSnapshot = querySnapshot, filteredPrevSnapshot = queryPrevSnapshot;
  if (activeEtfCodes) {
    filteredSnapshot = {}; filteredPrevSnapshot = {};
    activeEtfCodes.forEach(ec => { if (querySnapshot[ec]) filteredSnapshot[ec] = querySnapshot[ec]; if (queryPrevSnapshot[ec]) filteredPrevSnapshot[ec] = queryPrevSnapshot[ec]; });
  }
  const filteredAgg = aggregate(filteredSnapshot, queryPrices);
  const filteredPrevAgg = aggregate(filteredPrevSnapshot, queryPrices);
  const all = Object.values(filteredAgg);
  const filtered = stockSearch.trim()
    ? all.filter(s => s.code.indexOf(stockSearch) !== -1 || s.name.indexOf(stockSearch) !== -1)
    : all.sort((a, b) => b.total_lots - a.total_lots).slice(0, 30);

  let listHtml = '';
  filtered.forEach(s => { listHtml += '<button data-code="' + esc(s.code) + '" class="stk-btn w-full px-3 sm:px-4 py-2 text-left flex items-center justify-between gap-2 hover:bg-slate-800/50 ' + (selectedStock === s.code ? 'bg-slate-800' : '') + '"><div class="min-w-0"><div class="text-slate-200 text-sm truncate">' + esc(s.name) + '</div><div class="text-xs text-slate-500">' + esc(s.code) + ' · ' + s.etf_count + '檔持有</div></div><div class="text-right flex-shrink-0"><div class="text-sm num">' + fmt(s.total_lots) + '張</div><div class="text-xs text-amber-400 num">' + fmtM(s.market_value) + '</div></div></button>'; });
  if (!filtered.length) listHtml = '<div class="p-8 text-center text-sm text-slate-500">無符合</div>';
  let listTitle = stockSearch.trim() ? '符合 ' + filtered.length + ' 檔' : (isSingleFilter ? stockQueryEtfFilter + ' 持股 TOP 30' : (isMultiFilter ? '自選 ' + stockQueryEtfFilter.length + ' 檔合計持股 TOP 30' : '合計持股 TOP 30'));

  const detail = selectedStock && filteredAgg[selectedStock];
  const prevDetail = selectedStock && filteredPrevAgg[selectedStock];
  let detailHtml;
  if (!detail) {
    if (selectedStock) {
      const stkName = todayAgg[selectedStock] ? todayAgg[selectedStock].name : selectedStock;
      let reason = isSingleFilter ? esc(stockQueryEtfFilter) + ' 在 ' + esc(queryDateLabel) + ' 沒有持有此股' : (isMultiFilter ? '自選 ' + stockQueryEtfFilter.length + ' 檔在 ' + esc(queryDateLabel) + ' 都沒有持有此股' : esc(stkName) + ' 在 ' + esc(queryDateLabel) + ' 沒有任何 ETF 持有');
      detailHtml = '<div class="text-center py-12"><div class="text-amber-400 mb-2">⚠️ ' + reason + '</div><div class="text-xs text-slate-500">換個視角、日期或股票試試</div></div>';
    } else {
      detailHtml = '<div class="text-center text-sm text-slate-500 py-12">選擇左側個股查看詳情</div>';
    }
  } else {
    const prevLots = (prevDetail && prevDetail.total_lots) || 0, diff = detail.total_lots - prevLots;
    const diffColor = diff > 0 ? 'text-emerald-400' : (diff < 0 ? 'text-rose-400' : '');
    const dateBadge = stockQueryDate ? ' <span class="text-xs bg-amber-600/30 text-amber-300 px-2 py-0.5 rounded ml-1">' + esc(queryDateLabel) + '</span>' : '';
    let etfBadge = isSingleFilter ? ' <span class="text-xs bg-sky-600/30 text-sky-300 px-2 py-0.5 rounded ml-1">' + esc(stockQueryEtfFilter) + ' 視角</span>' : (isMultiFilter ? ' <span class="text-xs bg-sky-600/30 text-sky-300 px-2 py-0.5 rounded ml-1">自選 ' + stockQueryEtfFilter.length + ' 檔視角</span>' : '');
    const etfListLabel = isSingleFilter ? '此 ETF 對該股票:' : (isMultiFilter ? '自選 ' + stockQueryEtfFilter.length + ' 檔的持股 (實際持有 ' + detail.etfs.length + ' 檔):' : '持有此股的 ETF (' + detail.etfs.length + '檔):');
    let etfRowsHtml = '';
    detail.etfs.sort((a, b) => b.lots - a.lots).forEach(e => {
      const isNew = !stockQueryDate && NEW_ETFS.indexOf(e.etf) !== -1;
      const prevEtfHoldings = stockQueryDate ? ((queryData && queryData.prevSnap && queryData.prevSnap.today && queryData.prevSnap.today[e.etf] && queryData.prevSnap.today[e.etf].holdings) || []) : ((DATA.prev && DATA.prev[e.etf] && DATA.prev[e.etf].holdings) || []);
      const pv = prevEtfHoldings.find(h => h.code === detail.code);
      const d = e.lots - (pv ? pv.lots : 0);
      const dColor = isNew ? 'text-amber-400' : (d > 0 ? 'text-emerald-400' : (d < 0 ? 'text-rose-400' : 'text-slate-500'));
      const dText = isNew ? '首日' : (d !== 0 ? (d > 0 ? '+' : '') + fmt(d) : '—');
      etfRowsHtml += '<div class="flex items-center justify-between bg-slate-800/50 rounded px-2 py-1.5 text-xs sm:text-sm ' + (isNew ? 'border-l-2 border-amber-500' : '') + ' gap-2"><div class="min-w-0"><span class="text-slate-300">' + esc(e.etf_name) + '</span><span class="text-xs text-slate-500 ml-1">' + esc(e.etf) + '</span>' + (isNew ? '<span class="text-[10px] bg-amber-600/30 text-amber-300 px-1 rounded ml-1">新</span>' : '') + '</div><div class="flex items-center gap-2 text-xs flex-shrink-0"><span class="text-slate-400">' + e.weight + '%</span><span class="num text-slate-200">' + fmt(e.lots) + '張</span><span class="num font-semibold w-14 sm:w-16 text-right ' + dColor + '">' + dText + '</span><button onclick="openHistoryModal(\'' + esc(e.etf) + '\',\'' + esc(detail.code) + '\')" class="bg-slate-700 hover:bg-amber-600 text-slate-300 hover:text-white px-1.5 py-0.5 rounded transition cursor-pointer whitespace-nowrap">📈</button></div></div>';
    });
    detailHtml = '<div class="flex items-center justify-between mb-3 gap-2"><div class="min-w-0"><div class="font-bold text-base sm:text-lg truncate">' + esc(detail.name) + dateBadge + etfBadge + '</div><div class="text-xs text-slate-400">' + esc(detail.code) + ' · 收盤 ' + (detail.price ? fmt(detail.price, 2) : 'N/A') + '</div></div><div class="text-right flex-shrink-0"><div class="text-xs text-slate-500">' + (isSingleFilter || isMultiFilter ? '篩選後市值' : '合計市值') + '</div><div class="text-amber-400 font-bold">' + fmtM(detail.market_value) + '</div></div></div><div class="grid grid-cols-3 gap-2 mb-4 text-center"><div class="bg-slate-800 rounded p-2"><div class="text-xs text-slate-400">' + (stockQueryDate ? '當日合計' : '今日合計') + '</div><div class="num font-semibold text-sm">' + fmt(detail.total_lots) + '張</div></div><div class="bg-slate-800 rounded p-2"><div class="text-xs text-slate-400">' + (queryPrevLabel ? '前一筆 (' + esc(queryPrevLabel) + ')' : '前日合計') + '</div><div class="num text-sm">' + fmt(prevLots) + '張</div></div><div class="bg-slate-800 rounded p-2"><div class="text-xs text-slate-400">變動</div><div class="num font-semibold text-sm ' + diffColor + '">' + (diff > 0 ? '+' : '') + fmt(diff) + '</div></div></div><div class="text-xs text-slate-400 mb-2">' + etfListLabel + '</div><div class="space-y-1">' + etfRowsHtml + '</div>';
  }

  return '<h2 class="text-base sm:text-lg font-semibold mb-2 sm:mb-3">個股查詢</h2>'
    + dateSelectorHtml + etfFilterHtml
    + '<input id="stock-search" value="' + esc(stockSearch) + '" placeholder="輸入股票代號或名稱 (如 2330 或 台積電)" class="w-full md:max-w-md bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm mb-4 focus:outline-none focus:border-amber-500">'
    + '<div class="grid md:grid-cols-2 gap-3 sm:gap-4"><div class="bg-slate-900 border border-slate-800 rounded-lg overflow-hidden max-h-[60vh] md:max-h-[70vh] overflow-y-auto"><div id="stock-list-title" class="px-4 py-2 text-xs text-slate-400 border-b border-slate-800 sticky top-0 bg-slate-900">' + esc(listTitle) + '</div><div id="stock-list-container" class="divide-y divide-slate-800">' + listHtml + '</div></div><div id="stock-detail-container" class="bg-slate-900 border border-slate-800 rounded-lg p-3 sm:p-4">' + detailHtml + '</div></div>';
}
let _stockSearchTimer = null;
function bindStock(todayAgg, prevAgg) {
  const inp = document.getElementById('stock-search');
  if (inp) {
    inp.addEventListener('compositionstart', function() { inp._composing = true; });
    inp.addEventListener('compositionend', function(e) {
      inp._composing = false;
      stockSearch = e.target.value;
      clearTimeout(_stockSearchTimer);
      _stockSearchTimer = setTimeout(function() { renderStockList(); }, 0);
    });
    inp.addEventListener('input', function(e) {
      stockSearch = e.target.value;
      if (inp._composing) return; // 中文 IME 組字中，不觸發 render
      clearTimeout(_stockSearchTimer);
      _stockSearchTimer = setTimeout(function() { renderStockList(); }, 300);
    });
  }
  document.querySelectorAll('.stk-btn').forEach(btn => btn.addEventListener('click', () => { selectedStock = btn.dataset.code; render(); }));
}

function renderStockList() {
  // 只更新列表和詳情，不重建 input，避免手機 IME 被重置
  const todayAgg = aggregate(DATA.today, DATA.prices || {});
  const prevAgg = aggregate(DATA.prev || {}, DATA.prices || {});
  const listContainer = document.getElementById('stock-list-container');
  const detailContainer = document.getElementById('stock-detail-container');
  const titleEl = document.getElementById('stock-list-title');
  if (!listContainer || !detailContainer) { render(); return; }

  const isAll = !stockQueryEtfFilter, isMultiFilter = Array.isArray(stockQueryEtfFilter), isSingleFilter = typeof stockQueryEtfFilter === 'string';
  const queryData = getStockQuerySnap(stockQueryDate);
  let querySnapshot, queryPrices, queryPrevSnapshot, queryPrevLabel, queryDateLabel;
  if (queryData) {
    querySnapshot = queryData.snap.today || {}; queryPrices = queryData.snap.prices || {};
    queryDateLabel = stockQueryDate || DATA.today_date;
    queryPrevSnapshot = (queryData.prevSnap && queryData.prevSnap.today) || {}; queryPrevLabel = queryData.prevDate;
  } else {
    querySnapshot = DATA.today || {}; queryPrices = DATA.prices || {};
    queryDateLabel = DATA.today_date; queryPrevSnapshot = DATA.prev || {}; queryPrevLabel = DATA.prev_date;
  }
  let activeEtfCodes = isAll ? null : (isSingleFilter ? [stockQueryEtfFilter] : (isMultiFilter ? stockQueryEtfFilter : null));
  let filteredSnapshot = querySnapshot, filteredPrevSnapshot = queryPrevSnapshot;
  if (activeEtfCodes) {
    filteredSnapshot = {}; filteredPrevSnapshot = {};
    activeEtfCodes.forEach(ec => { if (querySnapshot[ec]) filteredSnapshot[ec] = querySnapshot[ec]; if (queryPrevSnapshot[ec]) filteredPrevSnapshot[ec] = queryPrevSnapshot[ec]; });
  }
  const filteredAgg = aggregate(filteredSnapshot, queryPrices);
  const filteredPrevAgg = aggregate(filteredPrevSnapshot, queryPrices);
  const all = Object.values(filteredAgg);
  const filtered = stockSearch.trim()
    ? all.filter(s => s.code.indexOf(stockSearch) !== -1 || s.name.indexOf(stockSearch) !== -1)
    : all.sort((a, b) => b.total_lots - a.total_lots).slice(0, 30);

  let listHtml = '';
  filtered.forEach(s => { listHtml += '<button data-code="' + esc(s.code) + '" class="stk-btn w-full px-3 sm:px-4 py-2 text-left flex items-center justify-between gap-2 hover:bg-slate-800/50 ' + (selectedStock === s.code ? 'bg-slate-800' : '') + '"><div class="min-w-0"><div class="text-slate-200 text-sm truncate">' + esc(s.name) + '</div><div class="text-xs text-slate-500">' + esc(s.code) + ' · ' + s.etf_count + '檔持有</div></div><div class="text-right flex-shrink-0"><div class="text-sm num">' + fmt(s.total_lots) + '張</div><div class="text-xs text-amber-400 num">' + fmtM(s.market_value) + '</div></div></button>'; });
  if (!filtered.length) listHtml = '<div class="p-8 text-center text-sm text-slate-500">無符合</div>';

  let listTitle = stockSearch.trim() ? '符合 ' + filtered.length + ' 檔' : (isSingleFilter ? stockQueryEtfFilter + ' 持股 TOP 30' : (isMultiFilter ? '自選 ' + stockQueryEtfFilter.length + ' 檔合計持股 TOP 30' : '合計持股 TOP 30'));
  if (titleEl) titleEl.textContent = listTitle;
  listContainer.innerHTML = listHtml;
  document.querySelectorAll('.stk-btn').forEach(btn => btn.addEventListener('click', () => { selectedStock = btn.dataset.code; render(); }));
}

document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => { currentTab = btn.dataset.tab; render(); }));

function loadData() {
  fetch('./latest.json?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('404'); return r.json(); })
    .then(d => { DATA = d; render(); })
    .catch(() => { DATA = null; render(); });
}
</script>
</body>
</html>
