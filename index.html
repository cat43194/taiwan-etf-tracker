function getEtfsBySize(size) {

function getMultiIssuers() {
  // 只回傳有 ≥2 檔 ETF 的投信(單檔的不另外做群組)
  const counts = {};
  Object.values(ETF_META).forEach(function(m) { counts[m.issuer] = (counts[m.issuer] || 0) + 1; });

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const TOP_N_MV = 50;

let DATA = null, currentTab = 'overview', selectedEtf = null, stockSearch = '', selectedStock = null, modalStock = null;

let etfMultiSelectMode = false;

let HISTORY_DATES = null;

let multiEndDate = null;

let historyModalStock = null;

let stockModalHistoryLoading = false;
let stockModalCustomMode = false;
let stockModalCustomSelected = [];

let mvSort = { key: null, dir: null };
let etfSort = { key: null, dir: null };
let flowSort = { buy: { key: null, dir: null }, sell: { key: null, dir: null } };

function fmt(n, d) {
  d = d || 0;
  if (n == null || isNaN(n)) return '-';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function fmtM(n) {
  if (n == null || isNaN(n)) return '-';
  if (Math.abs(n) >= 1e8) return (n / 1e8).toFixed(1) + '億';
  if (Math.abs(n) >= 1e4) return Math.round(n / 1e4) + '萬';
  return fmt(n);
}
function esc(s) {
  if (s == null) return '';
  return String(s)
    .split('&').join('&amp;')
    .split('<').join('&lt;')
    .split('>').join('&gt;')
    .split('"').join('&quot;')
    .split("'").join('&#39;');
}

function rankChangeHtml(todayRank, prevRank) {
  if (prevRank == null) return '<span class="text-amber-400 text-xs font-semibold ml-1">NEW</span>';
  const diff = prevRank - todayRank;
  if (diff > 0) return '<span class="text-rose-400 text-xs ml-1">↑' + diff + '</span>';
  if (diff < 0) return '<span class="text-emerald-400 text-xs ml-1">↓' + Math.abs(diff) + '</span>';
  return '<span class="text-slate-500 text-xs ml-1">—</span>';
}

function cycleSort(current, key) {
  if (current.key !== key) return { key: key, dir: 'desc' };
  if (current.dir === 'desc') return { key: key, dir: 'asc' };
  if (current.dir === 'asc') return { key: null, dir: null };
  return { key: key, dir: 'desc' };
}
function sortRows(rows, sortState, keyMap) {
  if (!sortState.key || !sortState.dir) return rows;
  const getter = keyMap[sortState.key];
  if (!getter) return rows;
  const sign = sortState.dir === 'desc' ? -1 : 1;
  return [...rows].sort(function(a, b) {
    const va = getter(a), vb = getter(b);
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') return sign * va.localeCompare(vb, 'zh-Hant');
    return sign * (va - vb);
  });
}
function sortIcon(sortState, key) {
  if (sortState.key !== key) return '<span class="text-slate-600 ml-0.5">⇅</span>';
  return sortState.dir === 'desc' ? '<span class="text-amber-400 ml-0.5">▼</span>' : '<span class="text-amber-400 ml-0.5">▲</span>';
}
function toggleMvSort(key) { mvSort = cycleSort(mvSort, key); render(); }
function toggleEtfSort(key) { etfSort = cycleSort(etfSort, key); render(); }
function toggleFlowSort(dir, key) { flowSort[dir] = cycleSort(flowSort[dir], key); render(); }
function toggleMultiSort(key) { multiSort = cycleSort(multiSort, key); render(); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 🎯 集中度指標 (HHI + Top10 占比)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function computeConcentration(holdings) {
  if (!holdings || !holdings.length) return null;
  const totalLots = holdings.reduce(function(s, h) { return s + (h.lots || 0); }, 0);
  if (!totalLots) return null;
  const sorted = [...holdings].sort(function(a, b) { return (b.lots || 0) - (a.lots || 0); });
  const top10Lots = sorted.slice(0, 10).reduce(function(s, h) { return s + (h.lots || 0); }, 0);
  const top10Pct = (top10Lots / totalLots) * 100;
  // HHI = Σ(個別占比%)² ;範圍 0~10000
  const hhi = sorted.reduce(function(s, h) {
    const pct = (h.lots / totalLots) * 100;
    return s + pct * pct;
  }, 0);
  let level, color;
  if (hhi < 1500) { level = '分散';     color = 'emerald'; }
  else if (hhi < 2500) { level = '中度集中'; color = 'amber'; }
  else { level = '高度集中'; color = 'rose'; }
  return { top10Pct: top10Pct, hhi: hhi, count: holdings.length, level: level, color: color };
}

function renderConcentrationBadge(conc) {
  if (!conc) return '';
  const colorCls = {
    emerald: 'bg-emerald-950/50 text-emerald-300 border-emerald-700/50',
    amber:   'bg-amber-950/50 text-amber-300 border-amber-700/50',
    rose:    'bg-rose-950/50 text-rose-300 border-rose-700/50',
  }[conc.color];
  return '<span class="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded border ' + colorCls + '" '
    + 'title="HHI ' + Math.round(conc.hhi) + ' (Herfindahl 集中度指數,< 1500 分散、1500-2500 中度、> 2500 高度集中)">'
    + '🎯 ' + conc.level
    + ' <span class="opacity-70">· HHI ' + Math.round(conc.hhi) + '</span>'
    + ' <span class="opacity-70">· Top10 ' + conc.top10Pct.toFixed(1) + '%</span>'
    + '</span>';
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 📡 智能訊號偵測 + 橫幅
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function generateDailySignals(todayAgg, prevAgg, newEtfs) {
  const signals = [];
  if (!DATA || !DATA.prev) return signals;

  // 對每檔股票算「今日 vs 昨日」每檔 ETF 的變動
  const stockChangeMap = {};
  Object.values(todayAgg).forEach(function(s) {
    let etfsBuying = [], etfsSelling = [], etfsNew = [];
    s.etfs.forEach(function(e) {
      // 排除新 ETF (首日不算買賣超)
      if (newEtfs.indexOf(e.etf) !== -1) return;
      const prevEtfHoldings = (DATA.prev && DATA.prev[e.etf] && DATA.prev[e.etf].holdings) || [];
      const prevHolding = prevEtfHoldings.find(function(h) { return h.code === s.code; });
      const prevLots = prevHolding ? prevHolding.lots : 0;
      const diff = e.lots - prevLots;
      const isFirstDay = !prevHolding && e.lots > 0;
      if (diff > 0) {
        etfsBuying.push({ etf: e.etf, etfName: e.etf_name, diff: diff, lots: e.lots, isFirstDay: isFirstDay });
      } else if (diff < 0) {
        etfsSelling.push({ etf: e.etf, etfName: e.etf_name, diff: diff, lots: e.lots });
      }
    });
    if (etfsBuying.length || etfsSelling.length) {
      const netDiff = etfsBuying.reduce(function(sum, e) { return sum + e.diff; }, 0)
                    + etfsSelling.reduce(function(sum, e) { return sum + e.diff; }, 0);
      stockChangeMap[s.code] = {
        code: s.code, name: s.name, price: s.price,
        etfsBuying: etfsBuying, etfsSelling: etfsSelling,
        netDiff: netDiff,
      };
    }
  });

  // 1️⃣ 共識訊號:同向 ≥ N 檔 ETF
  Object.values(stockChangeMap).forEach(function(s) {
    if (s.etfsBuying.length >= SIGNAL_THRESHOLDS.consensusEtfCount) {
      const totalDiff = s.etfsBuying.reduce(function(sum, e) { return sum + e.diff; }, 0);
      signals.push({
        type: 'consensus_buy',
        priority: 200 + s.etfsBuying.length * 10,
        icon: '🎯',
        color: 'emerald',
        text: '<b>' + esc(s.name) + '</b> (' + esc(s.code) + ') 今日共 <b class="text-emerald-300">' + s.etfsBuying.length + ' 檔 ETF 同步加碼</b>,合計 <b>+' + fmt(totalDiff) + '</b> 張',
        stock: s.code,
      });
    }
    if (s.etfsSelling.length >= SIGNAL_THRESHOLDS.consensusEtfCount) {
      const totalDiff = s.etfsSelling.reduce(function(sum, e) { return sum + e.diff; }, 0);
      signals.push({
        type: 'consensus_sell',
        priority: 200 + s.etfsSelling.length * 10,
        icon: '⚠️',
        color: 'rose',
        text: '<b>' + esc(s.name) + '</b> (' + esc(s.code) + ') 今日共 <b class="text-rose-300">' + s.etfsSelling.length + ' 檔 ETF 同步減碼</b>,合計 <b>' + fmt(totalDiff) + '</b> 張',
        stock: s.code,
      });
    }
  });

  // 2️⃣ 新進訊號:同日 ≥ N 檔 ETF 新進該股
  Object.values(stockChangeMap).forEach(function(s) {
    const newEntries = s.etfsBuying.filter(function(e) { return e.isFirstDay; });
    if (newEntries.length >= SIGNAL_THRESHOLDS.newEtfCount) {
      const totalLots = newEntries.reduce(function(sum, e) { return sum + e.lots; }, 0);
      signals.push({
        type: 'new_entry',
        priority: 150 + newEntries.length * 5,
        icon: '🆕',
        color: 'sky',
        text: '<b>' + esc(s.name) + '</b> (' + esc(s.code) + ') 今日 <b class="text-sky-300">' + newEntries.length + ' 檔 ETF 新進持股</b> (+' + fmt(totalLots) + ' 張)',
        stock: s.code,
      });
    }
  });

  // 3️⃣ 大額異動:|變動金額| Top N
  const sortedByValue = Object.values(stockChangeMap)
    .filter(function(s) { return s.price && s.netDiff !== 0; })
    .map(function(s) { return Object.assign({}, s, { valueChange: s.netDiff * 1000 * s.price }); })
    .sort(function(a, b) { return Math.abs(b.valueChange) - Math.abs(a.valueChange); })
    .slice(0, SIGNAL_THRESHOLDS.largeAmountTopN);

  sortedByValue.forEach(function(s, i) {
    const dir = s.netDiff > 0 ? '加碼' : '減碼';
    const sign = s.netDiff > 0 ? '+' : '';
    const valueSign = s.valueChange > 0 ? '+' : '';
    signals.push({
      type: 'large_amount',
      priority: 100 - i * 10,
      icon: '💥',
      color: s.netDiff > 0 ? 'emerald' : 'rose',
      text: '<b>' + esc(s.name) + '</b> (' + esc(s.code) + ') 大額' + dir + ' <b>' + sign + fmt(s.netDiff) + '</b> 張 <span class="opacity-80">(變動金額 ' + valueSign + fmtM(s.valueChange) + ')</span>',
      stock: s.code,
    });
  });

  // 排序 + 去重(同股票只留優先級最高的)
  signals.sort(function(a, b) { return b.priority - a.priority; });
  const seen = new Set();
  const dedupe = [];
  signals.forEach(function(sig) {
    if (sig.stock && seen.has(sig.stock)) return;
    if (sig.stock) seen.add(sig.stock);
    dedupe.push(sig);
  });
  return dedupe.slice(0, SIGNAL_THRESHOLDS.maxSignals);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 歷史快照載入
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function discoverHistoryDates() {
  if (HISTORY_DATES) return HISTORY_DATES;
  if (!DATA || !DATA.today_date) return [];
  const dates = [];
  const todayStr = DATA.today_date;
  const parts = todayStr.split('-');
  const todayObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  dates.push(todayStr);
  HISTORY_CACHE[todayStr] = { today: DATA.today, prev: DATA.prev, prices: DATA.prices, today_date: DATA.today_date };

  function formatLocalDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  // 探測過去 90 天 (從 21 改成 90,讓 MTD/QTD 能找到資料)
  const probes = [];
  for (let i = 1; i <= 90; i++) {
    const d = new Date(todayObj);
    d.setDate(d.getDate() - i);
    probes.push(formatLocalDate(d));
  }

  const results = await Promise.allSettled(
    probes.map(function(ds) {
      return fetch('./snapshots/snapshot-' + ds + '.json?t=' + Date.now())
        .then(function(r) { return r.ok ? r.json().then(function(j) { return { ds: ds, j: j }; }) : null; })
        .catch(function() { return null; });
    })
  );

  results.forEach(function(r) {
    if (r.status === 'fulfilled' && r.value) {
      const ds = r.value.ds;
      const j = r.value.j;
      dates.push(ds);
      HISTORY_CACHE[ds] = j;
    }
  });

  dates.sort(function(a, b) { return b.localeCompare(a); });
  HISTORY_DATES = [...new Set(dates)];
  return HISTORY_DATES;
}

function getStartDateByOffset(n) {
  if (!HISTORY_DATES || HISTORY_DATES.length === 0) return null;
  if (n >= HISTORY_DATES.length) return HISTORY_DATES[HISTORY_DATES.length - 1];
  return HISTORY_DATES[n];
}

function snapToHistoryDate(targetDate) {
  if (!HISTORY_DATES || HISTORY_DATES.length === 0) return null;
  for (let i = 0; i < HISTORY_DATES.length; i++) {
    if (HISTORY_DATES[i] <= targetDate) return HISTORY_DATES[i];
  }
  return HISTORY_DATES[HISTORY_DATES.length - 1];
}

function computeMultiFlow(startSnap, endSnap, prices) {
  if (!startSnap || !endSnap) return [];
  const startAgg = aggregate(startSnap.today || {}, prices);
  const endAgg = aggregate(endSnap.today || {}, prices);
  const keys = new Set([...Object.keys(startAgg), ...Object.keys(endAgg)]);
  const flows = [];
  keys.forEach(function(code) {
    const s = startAgg[code], e = endAgg[code];
    const start_lots = s ? s.total_lots : 0;
    const end_lots = e ? e.total_lots : 0;
    const diff = end_lots - start_lots;
    const price = prices[code] != null ? prices[code] : null;
    const name = (e && e.name) || (s && s.name) || code;
    const etf_count = e ? e.etf_count : 0;
    flows.push({
      code: code, name: name,
      start_lots: start_lots, end_lots: end_lots, diff: diff,
      price: price,
      diff_value: price ? diff * 1000 * price : null,
      etf_count: etf_count,
      is_new: start_lots === 0 && end_lots > 0,
      is_cleared: start_lots > 0 && end_lots === 0,
    });
  });
  return flows;
}

function getStockQuerySnap(targetDate) {

    };

  let prevSnap = null;
  if (idx >= 0 && idx + 1 < HISTORY_DATES.length) {
    prevDate = HISTORY_DATES[idx + 1];
    prevSnap = HISTORY_CACHE[prevDate];
  }
  return { snap: snap, prevDate: prevDate, prevSnap: prevSnap };
}

function aggregate(snapshot, prices) {
  const map = {};
  Object.entries(snapshot || {}).forEach(function(entry) {
    const etfCode = entry[0], etf = entry[1];
    (etf.holdings || []).forEach(function(h) {
      if (!map[h.code]) map[h.code] = { code: h.code, name: h.name, total_lots: 0, etfs: [] };
      map[h.code].total_lots += (h.lots || 0);
      map[h.code].etfs.push({ etf: etfCode, etf_name: etf.name, lots: h.lots, weight: h.weight });
    });
  });
  Object.values(map).forEach(function(s) {
    s.price = prices[s.code] != null ? prices[s.code] : null;
    s.market_value = s.price ? s.total_lots * 1000 * s.price : null;
    s.etf_count = s.etfs.length;
  });
  return map;
}

function buildPrevRankMap(prevAgg, sortKey) {
  const sorted = Object.values(prevAgg)
    .filter(function(s) { return s[sortKey] != null && s[sortKey] !== 0; })
    .sort(function(a, b) { return b[sortKey] - a[sortKey]; });
  const map = {};
  sorted.forEach(function(s, i) { map[s.code] = i + 1; });
  return map;
}

function detectNewEtfs(todaySnap, prevSnap) {
  const todayKeys = new Set(Object.keys(todaySnap || {}));
  const prevKeys = new Set(Object.keys(prevSnap || {}));
  if (prevKeys.size === 0) return [];
  const added = [];
  todayKeys.forEach(function(k) {
    if (!prevKeys.has(k)) added.push(k);
  });
  return added;
}

function computeFlows(todaySnap, prevSnap, prices, newEtfs) {
  const filteredTodaySnap = {};
  Object.entries(todaySnap || {}).forEach(function(entry) {
    const etfCode = entry[0], etf = entry[1];
    if (newEtfs.indexOf(etfCode) === -1) {
      filteredTodaySnap[etfCode] = etf;
    }
  });
  const filteredTodayAgg = aggregate(filteredTodaySnap, prices);
  const prevAgg = aggregate(prevSnap, prices);

  const keys = new Set([...Object.keys(filteredTodayAgg), ...Object.keys(prevAgg)]);
  const flows = [];
  keys.forEach(function(code) {
    const t = filteredTodayAgg[code], p = prevAgg[code];
    const today_lots = t ? t.total_lots : 0;
    const prev_lots = p ? p.total_lots : 0;
    const diff = today_lots - prev_lots;
    const price = prices[code] != null ? prices[code] : null;
    const todayAggFull = aggregate(todaySnap, prices);
    const full_today_lots = todayAggFull[code] ? todayAggFull[code].total_lots : 0;
    const full_etf_count = todayAggFull[code] ? todayAggFull[code].etf_count : 0;
    flows.push({
      code: code,
      name: (t && t.name) || (p && p.name) || (todayAggFull[code] && todayAggFull[code].name) || code,
      today_lots: today_lots, prev_lots: prev_lots, diff: diff,
      diff_pct: prev_lots > 0 ? (diff / prev_lots) * 100 : (today_lots > 0 ? 999 : 0),
      price: price, diff_value: price ? diff * 1000 * price : null,
      etf_count: full_etf_count,
      has_new_etf: full_today_lots !== today_lots,
    });
  });
  return flows;
}

function getEtfStockHistory(etfCode, stockCode) {
  if (!HISTORY_DATES) return [];
  const series = [];
  HISTORY_DATES.forEach(function(date) {
    const snap = HISTORY_CACHE[date];
    if (!snap || !snap.today || !snap.today[etfCode]) return;
    const etfData = snap.today[etfCode];
    const holding = (etfData.holdings || []).find(function(h) { return h.code === stockCode; });
    const lots = holding ? holding.lots : 0;
    const price = (snap.prices && snap.prices[stockCode]) || null;
    const mv = price ? lots * 1000 * price : null;
    const weight = holding ? holding.weight : null;
    series.push({
      date: date, lots: lots, price: price, mv: mv, weight: weight,
      held: lots > 0,
      etfName: etfData.name || etfCode,
      stockName: holding ? holding.name : null,
    });
  });
  return series;
}

function getStockTotalHistory(stockCode, etfCodes) {
  if (!HISTORY_DATES) return [];
  const series = [];
  HISTORY_DATES.forEach(function(date) {
    const snap = HISTORY_CACHE[date];
    if (!snap || !snap.today) return;
    let totalLots = 0, etfCount = 0, stockName = null;
    const targets = etfCodes || Object.keys(snap.today);
    targets.forEach(function(ec) {
      const etfData = snap.today[ec];
      if (!etfData) return;
      const holding = (etfData.holdings || []).find(function(h) { return h.code === stockCode; });
      if (holding && holding.lots > 0) {
        totalLots += holding.lots;
        etfCount += 1;
        if (!stockName) stockName = holding.name;
      }
    });
    const price = (snap.prices && snap.prices[stockCode]) || null;
    const mv = price ? totalLots * 1000 * price : null;
    series.push({
      date: date, lots: totalLots, price: price, mv: mv, etf_count: etfCount,
      held: totalLots > 0, stockName: stockName,
    });
  });
  return series;
}

    }
    rowsHtml += '<td class="px-2 sm:px-3 py-2 text-right num text-slate-400">' + priceCell + '</td>'
      + '<td class="px-2 sm:px-3 py-2 text-right num text-amber-400 whitespace-nowrap">' + mvCell + '</td>'
      + '<td class="px-2 sm:px-3 py-2 text-right num font-semibold ' + dColor + ' whitespace-nowrap">' + dText + '</td>'
      + '</tr>';
  });

  let headerCols = '<th class="px-2 sm:px-3 py-2 text-left">日期</th>'
    + '<th class="px-2 sm:px-3 py-2 text-right">張數</th>'
    + '<th class="px-2 sm:px-3 py-2 text-right">' + (isSingleEtf ? '比例' : 'ETF 數') + '</th>'

    + '<th class="px-2 sm:px-3 py-2 text-right">市值</th>'
    + '<th class="px-2 sm:px-3 py-2 text-right">較前日</th>';

  return filterHtml + statsHtml
    + '<div class="overflow-y-auto flex-1">'
    + '<table class="w-full text-sm">'
    + '<thead class="bg-slate-800/50 text-slate-400 text-xs sticky top-0">'
    + '<tr>' + headerCols + '</tr></thead>'
    + '<tbody class="divide-y divide-slate-800">' + rowsHtml + '</tbody>'
    + '</table>'
    + '</div>';
}

function render() {
  const main = document.getElementById('main');
  const banner = document.getElementById('new-etf-banner');
  if (!DATA) {
    main.innerHTML = '<div class="max-w-lg mx-auto mt-16 text-center p-6 bg-slate-900 border border-slate-800 rounded-lg">'
      + '<div class="text-rose-400 font-semibold mb-3 text-lg">⚠️ 尚無資料</div>'
      + '<p class="text-sm text-slate-400">GitHub Actions 還沒跑過第一次,<br>或 latest.json 尚未被 commit。</p></div>';
    if (banner) banner.classList.add('hidden');
    return;
  }

  NEW_ETFS = detectNewEtfs(DATA.today, DATA.prev);
  const todayAgg = aggregate(DATA.today, DATA.prices || {});
  const prevAgg = aggregate(DATA.prev || {}, DATA.prices || {});
  const flows = computeFlows(DATA.today, DATA.prev || {}, DATA.prices || {}, NEW_ETFS);

  const buy = flows.filter(function(f) { return f.diff > 0; }).sort(function(a, b) { return b.diff - a.diff; }).slice(0, TOP_N_FLOW);
  const sell = flows.filter(function(f) { return f.diff < 0; }).sort(function(a, b) { return a.diff - b.diff; }).slice(0, TOP_N_FLOW);
  const mv = Object.values(todayAgg).filter(function(s) { return s.market_value != null; }).sort(function(a, b) { return b.market_value - a.market_value; }).slice(0, TOP_N_MV);
  const buyOverview = buy;
  const sellOverview = sell;
  const mvOverview = Object.values(todayAgg).filter(function(s) { return s.market_value != null; }).sort(function(a, b) { return b.market_value - a.market_value; }).slice(0, TOP_N_OVERVIEW);
  const prevMvRank = buildPrevRankMap(prevAgg, 'market_value');

  document.getElementById('header-sub').textContent = Object.keys(DATA.today).length + ' 檔 ETF · ' + Object.keys(todayAgg).length + ' 檔個股';
  document.getElementById('update-info').innerHTML = '📅 ' + DATA.today_date + ' <span class="text-slate-500">vs</span> ' + (DATA.prev_date || '—');

  if (NEW_ETFS.length > 0 && banner) {
    const names = NEW_ETFS.map(function(k) {
      const n = (DATA.today[k] && DATA.today[k].name) || (ETF_META[k] && ETF_META[k].name) || k;
      return '<span class="font-semibold">' + esc(n) + '</span> (' + esc(k) + ')';
    }).join('、');

    + (multiPreset === 'custom' ? renderCustomDatePicker() : '')
    + renderMultiPeriodInfo()
    + '</div>';

  if (multiLoading) return headerControls + '<div class="text-center text-slate-400 py-12">載入歷史快照中...</div>';

  if (!HISTORY_DATES || HISTORY_DATES.length < 2) {
    return headerControls + '<div class="text-center text-rose-400 py-12">'
      + '⚠️ 歷史快照不足 (僅 ' + (HISTORY_DATES ? HISTORY_DATES.length : 0) + ' 天),無法計算期間變動。<br>'
      + '<span class="text-xs text-slate-500">需要至少 2 天的快照才能比較</span>'
      + '</div>';
  }

  const range = getMultiRange();
  if (!range.validRange) {
    return headerControls + '<div class="text-center text-amber-400 py-12">⚠️ 期間不足或日期無效,請改選較短期間或自選日期</div>';
  }

  const startSnap = HISTORY_CACHE[range.startDate];
  const endSnap = HISTORY_CACHE[range.endDate];
  if (!startSnap || !endSnap) return headerControls + '<div class="text-center text-rose-400 py-12">⚠️ 無法載入該日期快照</div>';

  const prices = endSnap.prices || {};
  const flows = computeMultiFlow(startSnap, endSnap, prices);
  const buy = flows.filter(function(f) { return f.diff > 0; }).sort(function(a, b) { return b.diff - a.diff; }).slice(0, MULTI_TOP_N);
  const sell = flows.filter(function(f) { return f.diff < 0; }).sort(function(a, b) { return a.diff - b.diff; }).slice(0, MULTI_TOP_N);

  return headerControls
    + '<div class="flex gap-2 mb-3">'
    + '<button onclick="toggleMultiSubTab(\'buy\')" class="px-4 py-1.5 text-sm rounded ' + (multiSubTab === 'buy' ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-300 hover:bg-slate-700') + '">📈 買超 TOP ' + MULTI_TOP_N + '</button>'

    + '</div>'
    + renderMultiTable(multiSubTab === 'buy' ? buy : sell, multiSubTab);
}

  const endVal = multiEndDate || maxDate;
  const snappedStart = snapToHistoryDate(startVal);
  const snappedEnd = snapToHistoryDate(endVal);
  const startNote = (snappedStart && snappedStart !== startVal) ? ' <span class="text-amber-400">→ 對齊至 ' + esc(snappedStart) + '</span>' : '';
  const endNote = (snappedEnd && snappedEnd !== endVal) ? ' <span class="text-amber-400">→ 對齊至 ' + esc(snappedEnd) + '</span>' : '';
  return '<div class="flex flex-wrap items-center gap-2 mb-3 text-sm">'

    + '<span class="text-xs text-slate-500 ml-2">(可用 ' + HISTORY_DATES.length + ' 天歷史: ' + esc(minDate) + ' ~ ' + esc(maxDate) + ')</span>'
    + '</div>';
}

// 🆕 加入 1d / 5d / 10d / mtd / qtd 邏輯
function getMultiRange() {
  if (!HISTORY_DATES || HISTORY_DATES.length < 2) return { validRange: false };
  const endDate = HISTORY_DATES[0];
  let startDate;

  if (multiPreset === '1d') startDate = getStartDateByOffset(1);
  else if (multiPreset === '5d') startDate = getStartDateByOffset(5);
  else if (multiPreset === '10d') startDate = getStartDateByOffset(10);
  else if (multiPreset === 'mtd') {
    // 月初:取 endDate 當月 1 日的最近(或之前最近)的歷史快照
    const parts = endDate.split('-');
    const monthStartStr = parts[0] + '-' + parts[1] + '-01';
    startDate = snapToHistoryDate(monthStartStr);
    // 若月初剛好等於 endDate(月初當天),退回前一筆
    if (startDate === endDate && HISTORY_DATES.length > 1) startDate = HISTORY_DATES[1];
  }
  else if (multiPreset === 'qtd') {
    // 季初:1月/4月/7月/10月 1 日
    const parts = endDate.split('-');
    const month = parseInt(parts[1]);
    const quarterStartMonth = Math.floor((month - 1) / 3) * 3 + 1;
    const quarterStartStr = parts[0] + '-' + String(quarterStartMonth).padStart(2, '0') + '-01';
    startDate = snapToHistoryDate(quarterStartStr);
    if (startDate === endDate && HISTORY_DATES.length > 1) startDate = HISTORY_DATES[1];
  }
  else if (multiPreset === 'custom') {
    if (!multiStartDate || !multiEndDate) return { validRange: false };
    if (multiStartDate >= multiEndDate) return { validRange: false };
    const snappedStart = snapToHistoryDate(multiStartDate);
    const snappedEnd = snapToHistoryDate(multiEndDate);
    if (!snappedStart || !snappedEnd || snappedStart >= snappedEnd) return { validRange: false };
    return { startDate: snappedStart, endDate: snappedEnd, validRange: true };
  } else {
    startDate = getStartDateByOffset(1);
  }
  if (!startDate || startDate === endDate) return { validRange: false };
  return { startDate: startDate, endDate: endDate, validRange: true };
}

function renderMultiPeriodInfo() {
  if (!HISTORY_DATES || HISTORY_DATES.length < 2) return '';
  const range = getMultiRange();
  if (!range.validRange) {
    let hintText = '⚠️ 請選擇有效的日期區間';
    if (multiPreset === 'mtd') hintText = '⚠️ 本月才剛開始,歷史不足無法計算 MTD,請改用其他期間';
    else if (multiPreset === 'qtd') hintText = '⚠️ 本季才剛開始,歷史不足無法計算 QTD,請改用其他期間';
    return '<div class="text-xs text-amber-400">' + hintText + '</div>';
  }
  const startIdx = HISTORY_DATES.indexOf(range.startDate);
  const endIdx = HISTORY_DATES.indexOf(range.endDate);
  const tradingDays = (startIdx >= 0 && endIdx >= 0) ? Math.abs(startIdx - endIdx) + 1 : '?';
  return '<div class="text-xs text-slate-400">'
    + '比較區間: <span class="text-slate-200">' + esc(range.startDate) + '</span>'
    + ' <span class="text-slate-600">→</span> '
    + '<span class="text-slate-200">' + esc(range.endDate) + '</span>'
    + '<span class="text-slate-500 ml-2">(含起迄共 ' + tradingDays + ' 個交易日,共 ' + HISTORY_DATES.length + ' 天歷史可用)</span>'
    + '</div>';
}

    end_lots: function(r) { return r.end_lots; },
    diff: function(r) { return r.diff; },
    diff_value: function(r) { return r.diff_value; },
  };
  const sorted = sortRows(rows, multiSort, keyMap);
  function thMu(lab, key, align) {
    const a = align || 'right';
    return '<th class="px-2 py-2 text-' + a + ' sort-th" onclick="toggleMultiSort(\'' + key + '\')">' + esc(lab) + sortIcon(multiSort, key) + '</th>';
  }
  let rowsHtml = '';
  sorted.forEach(function(r, i) {
    const tag = r.is_new
      ? '<span class="text-[10px] bg-amber-600/30 text-amber-300 px-1 rounded ml-1">NEW</span>'
      : (r.is_cleared ? '<span class="text-[10px] bg-slate-700 text-slate-300 px-1 rounded ml-1">出清</span>' : '');
    rowsHtml += '<tr class="hover:bg-slate-800/30">'
      + '<td class="px-2 py-2 text-slate-500">' + (i + 1) + '</td>'
      + '<td class="px-2 py-2 stock-cell stock-link" onclick="openStockModal(\'' + esc(r.code) + '\')">'
      + '<div class="text-slate-200 stk-name">' + esc(r.name) + tag + '</div>'
      + '<div class="text-xs text-slate-500 stk-meta">' + esc(r.code) + ' · ' + r.etf_count + '檔</div>'
      + '</td>'
      + '<td class="px-2 py-2 text-right num text-slate-400">' + fmt(r.start_lots) + '</td>'
      + '<td class="px-2 py-2 text-right num">' + fmt(r.end_lots) + '</td>'
      + '<td class="px-2 py-2 text-right num font-semibold text-' + color + '-400">' + (r.diff > 0 ? '+' : '') + fmt(r.diff) + '</td>'
      + '<td class="px-2 py-2 text-right num text-xs text-' + color + '-400 whitespace-nowrap">' + (r.diff_value != null ? (r.diff > 0 ? '+' : '') + fmtM(r.diff_value) : '-') + '</td>'
      + '</tr>';
  });
  return '<div class="text-xs text-slate-500 mb-3">💡 點擊股票名稱查看持有 ETF · 點擊欄位標題排序</div>'
    + '<div class="bg-slate-900 border border-slate-800 rounded-lg overflow-x-auto">'
    + '<table class="w-full text-sm">'
    + '<thead class="bg-slate-800/50 text-slate-400 text-xs"><tr>'
    + '<th class="px-2 py-2 text-left">#</th>'
    + thMu('股票', 'name', 'left')
    + thMu('起日張', 'start_lots')
    + thMu('迄日張', 'end_lots')
    + thMu(label, 'diff')
    + thMu('變動金額', 'diff_value')
    + '</tr></thead>'
    + '<tbody class="divide-y divide-slate-800">' + rowsHtml + '</tbody>'
    + '</table></div>';
}

function renderETF() {
  const etfKeys = Object.keys(DATA.today);
  const isMulti = !!(selectedEtfMulti && selectedEtfMulti.length > 1);
  if (!isMulti) {
    if (!selectedEtf || !DATA.today[selectedEtf]) selectedEtf = etfKeys[0];
  }

  let displayName, displayCode, displayHoldingsDate, isNewEtf, rawRows, totalMV, etfsInScope;
  let concentration = null; // 🆕 集中度資料

  if (isMulti) {
    etfsInScope = selectedEtfMulti.filter(function(k) { return DATA.today[k]; });
    displayCode = '自選 ' + etfsInScope.length + ' 檔';
    displayName = '組合: ' + etfsInScope.join(', ');
    displayHoldingsDate = null;
    isNewEtf = false;

    const merged = {};
    etfsInScope.forEach(function(k) {
      const etfData = DATA.today[k];
      if (!etfData) return;
      const prevHoldings = (DATA.prev && DATA.prev[k] && DATA.prev[k].holdings) || [];
      const prevMap = {};
      prevHoldings.forEach(function(h) { prevMap[h.code] = h.lots; });
      const isThisNew = NEW_ETFS.indexOf(k) !== -1;
      (etfData.holdings || []).forEach(function(h) {
        if (!merged[h.code]) {
          merged[h.code] = { code: h.code, name: h.name, lots: 0, prev_lots: 0, weight_sum: 0, etf_count: 0, etfs: [], has_new_etf: false };
        }
        merged[h.code].lots += h.lots;
        merged[h.code].prev_lots += isThisNew ? h.lots : (prevMap[h.code] || 0);
        merged[h.code].weight_sum += (h.weight || 0);
        merged[h.code].etf_count += 1;
        merged[h.code].etfs.push(k);
        if (isThisNew) merged[h.code].has_new_etf = true;
      });
    });
    rawRows = Object.values(merged).map(function(r) {
      const price = (DATA.prices && DATA.prices[r.code]) || null;
      return {
        code: r.code, name: r.name, lots: r.lots,
        weight: r.weight_sum / etfsInScope.length,
        prev_lots: r.prev_lots, diff: r.lots - r.prev_lots,
        price: price, mv: price ? r.lots * 1000 * price : null,
        etf_count_in_scope: r.etf_count, has_new_etf: r.has_new_etf,
      };
    });
    totalMV = rawRows.reduce(function(s, r) { return s + (r.mv || 0); }, 0);
    concentration = computeConcentration(rawRows);
  } else {
    const today = DATA.today[selectedEtf];
    const prev = DATA.prev && DATA.prev[selectedEtf];
    const prevMap = {};
    ((prev && prev.holdings) || []).forEach(function(h) { prevMap[h.code] = h.lots; });
    isNewEtf = NEW_ETFS.indexOf(selectedEtf) !== -1;
    rawRows = ((today && today.holdings) || []).map(function(h) {
      const price = (DATA.prices && DATA.prices[h.code]) || null;
      return {
        code: h.code, name: h.name, lots: h.lots, weight: h.weight,
        prev_lots: prevMap[h.code] || 0,
        diff: isNewEtf ? 0 : h.lots - (prevMap[h.code] || 0),
        price: price, mv: price ? h.lots * 1000 * price : null,
      };
    });
    totalMV = rawRows.reduce(function(s, r) { return s + (r.mv || 0); }, 0);
    displayName = today.name;
    displayCode = selectedEtf;
    displayHoldingsDate = today.holdings_date;
    etfsInScope = [selectedEtf];
    concentration = computeConcentration(today.holdings || []);
  }

  const keyMap = {
    name: function(r) { return r.name; },
    weight: function(r) { return r.weight; },
    prev_lots: function(r) { return r.prev_lots; },
    lots: function(r) { return r.lots; },
    diff: function(r) { return r.diff; },
    price: function(r) { return r.price; },
    mv: function(r) { return r.mv; },
  };
  const defaultSort = isMulti
    ? [...rawRows].sort(function(a, b) { return b.lots - a.lots; })
    : [...rawRows].sort(function(a, b) { return b.weight - a.weight; });
  const rows = (etfSort.key && etfSort.dir) ? sortRows(rawRows, etfSort, keyMap) : defaultSort;

  function thEtf(lab, key, align) {
    const a = align || 'right';

  // 多選模式開關鈕

  let etfBtnsHtml = modeToggleBtn;
  etfKeys.forEach(function(k) {

    }
    const badge = isNew ? ' <span class="text-[10px] bg-amber-400/30 px-1 rounded">新</span>' : '';
    etfBtnsHtml += '<button data-etf="' + esc(k) + '" class="etf-btn px-2 sm:px-3 py-1.5 text-xs sm:text-sm rounded ' + base + checkedClass + ' whitespace-nowrap">' + esc(k) + badge + '</button>';

  // 🆕 規模/投信群組快捷鈕(多選模式中才顯示,方便快速套用)
  let groupShortcutsHtml = '';
  if (etfMultiSelectMode) {
    let sizeBtnsHtml = '';
    Object.keys(SIZE_LABELS).forEach(function(sz) {
      const codes = getEtfsBySize(sz).filter(function(c) { return DATA.today[c]; });
      if (codes.length === 0) return;
      sizeBtnsHtml += '<button onclick="applyEtfMultiGroup(\'size\',\'' + sz + '\')" class="px-2 py-1 text-xs rounded bg-amber-700/40 hover:bg-amber-600 text-amber-100 whitespace-nowrap">'
        + SIZE_LABELS[sz].label + '</button>';
    });
    let issuerBtnsHtml = '';
    getMultiIssuers().forEach(function(iss) {
      const codes = getEtfsByIssuer(iss).filter(function(c) { return DATA.today[c]; });
      if (codes.length < 2) return;
      issuerBtnsHtml += '<button onclick="applyEtfMultiGroup(\'issuer\',\'' + esc(iss) + '\')" class="px-2 py-1 text-xs rounded bg-purple-700/40 hover:bg-purple-600 text-purple-100 whitespace-nowrap">'
        + '🏦 ' + esc(iss) + '系</button>';
    });
    groupShortcutsHtml = '<div class="bg-slate-900/50 border border-slate-800 rounded-lg p-2 mb-3">'
      + '<div class="text-xs text-slate-400 mb-2">💡 快速套用群組:</div>'
      + '<div class="flex flex-wrap gap-1.5 mb-2">'
      + '<span class="text-xs text-slate-500 self-center mr-1">規模:</span>' + sizeBtnsHtml
      + '</div>'
      + '<div class="flex flex-wrap gap-1.5">'
      + '<span class="text-xs text-slate-500 self-center mr-1">投信:</span>' + issuerBtnsHtml
      + '</div>'
      + '</div>';
  }

  let multiHintHtml;
  if (etfMultiSelectMode) {
    const selectedCount = selectedEtfMulti ? selectedEtfMulti.length : 0;
    multiHintHtml = '<div class="text-xs text-sky-300 mb-3 flex flex-wrap items-center gap-2 bg-sky-950/30 border border-sky-800/50 rounded p-2">'
      + '<span>🔗 多選模式中 — 點擊 ETF 鈕加入/移除組合 (已選 ' + selectedCount + ' 檔)</span>'
      + '<button onclick="clearEtfMulti()" class="px-2 py-0.5 rounded bg-slate-800 hover:bg-rose-600 text-slate-300 hover:text-white">清空</button>'
      + '<button onclick="selectAllEtfMulti()" class="px-2 py-0.5 rounded bg-slate-800 hover:bg-emerald-600 text-slate-300 hover:text-white">全選</button>'
      + '<span class="text-slate-500 ml-auto">完成後按「✅ 完成多選」</span>'
      + '</div>';
  } else if (isMulti) {
    multiHintHtml = '<div class="text-xs text-sky-300 mb-3 flex flex-wrap items-center gap-2 bg-sky-950/30 border border-sky-800/50 rounded p-2">'
      + '<span>📊 多檔合計顯示中 — 已選 ' + selectedEtfMulti.length + ' 檔: ' + selectedEtfMulti.join(', ') + '</span>'
      + '<button onclick="toggleEtfMultiMode()" class="px-2 py-0.5 rounded bg-sky-700 hover:bg-sky-600 text-white">編輯組合</button>'
      + '<button onclick="clearEtfMulti()" class="px-2 py-0.5 rounded bg-slate-800 hover:bg-rose-600 text-slate-300 hover:text-white">清除</button>'
      + '</div>';
  } else {
    multiHintHtml = '<div class="text-xs text-slate-500 mb-3">💡 想看多檔合計持股? 點上方「🔗 多選模式」鈕</div>';
  }

  let rowsHtml = '';
  rows.forEach(function(r, i) {
    const diffColor = (!isMulti && isNewEtf) ? 'text-amber-400' : (r.diff > 0 ? 'text-emerald-400' : (r.diff < 0 ? 'text-rose-400' : 'text-slate-500'));
    const diffText = (!isMulti && isNewEtf) ? '首日' : (r.diff !== 0 ? (r.diff > 0 ? '+' : '') + fmt(r.diff) : '—');
    const weightCell = isMulti ? r.etf_count_in_scope + '/' + etfsInScope.length + '檔' : r.weight.toFixed(2) + '%';
    const weightTitle = isMulti ? '在自選 ' + etfsInScope.length + ' 檔中,共有 ' + r.etf_count_in_scope + ' 檔持有此股票' : '';
    rowsHtml += '<tr class="hover:bg-slate-800/30">'
      + '<td class="px-2 py-1.5 text-slate-500">' + (i + 1) + '</td>'
      + '<td class="px-2 py-1.5 stock-cell stock-link" onclick="openStockModal(\'' + esc(r.code) + '\')">'
      + '<div class="text-slate-200 stk-name">' + esc(r.name) + (isMulti && r.has_new_etf ? '<span class="text-amber-400 text-xs ml-1">(含新)</span>' : '') + '</div>'
      + '<div class="text-xs text-slate-500 stk-meta">' + esc(r.code) + '</div>'
      + '</td>'
      + '<td class="px-2 py-1.5 text-right num"' + (weightTitle ? ' title="' + esc(weightTitle) + '"' : '') + '>' + weightCell + '</td>'
      + '<td class="px-2 py-1.5 text-right num text-slate-400">' + (!isMulti && isNewEtf ? '—' : fmt(r.prev_lots)) + '</td>'
      + '<td class="px-2 py-1.5 text-right num">' + fmt(r.lots) + '</td>'
      + '<td class="px-2 py-1.5 text-right num ' + diffColor + '">' + diffText + '</td>'
      + '<td class="px-2 py-1.5 text-right num text-slate-400">' + (r.price ? fmt(r.price, 2) : '-') + '</td>'
      + '<td class="px-2 py-1.5 text-right num text-amber-400 whitespace-nowrap">' + fmtM(r.mv) + '</td>';
    if (!isMulti) {
      rowsHtml += '<td class="px-2 py-1.5 text-center">'
        + '<button onclick="openHistoryModal(\'' + esc(selectedEtf) + '\',\'' + esc(r.code) + '\')" '
        + 'title="查看 ' + esc(r.name) + ' 在此 ETF 的歷史持股" '
        + 'class="bg-slate-800 hover:bg-amber-600 text-slate-300 hover:text-white px-2 py-0.5 rounded text-xs transition cursor-pointer whitespace-nowrap">📈 歷史</button>'

  // 🆕 集中度指標 line
  const concentrationLine = concentration ? '<div class="mt-2">' + renderConcentrationBadge(concentration) + '</div>' : '';

  let bodyHtml;
  if (etfMultiSelectMode && (!selectedEtfMulti || selectedEtfMulti.length === 0)) {
    bodyHtml = '<div class="bg-slate-900 border border-slate-800 rounded-lg p-8 text-center">'

      + '</div>';
  } else if (etfMultiSelectMode && selectedEtfMulti && selectedEtfMulti.length === 1) {
    bodyHtml = '<div class="bg-slate-900 border border-slate-800 rounded-lg p-8 text-center">'
      + '<div class="text-sky-300 mb-2">🔗 已選 1 檔 (' + selectedEtfMulti[0] + ')</div>'
      + '<div class="text-xs text-slate-500">至少再選 1 檔才能看合計, 或按「✅ 完成多選」直接看單檔</div>'
      + '</div>';
  } else {
    bodyHtml = '<div class="bg-slate-900 border border-slate-800 rounded-lg p-3 sm:p-4">'
      + '<div class="flex items-start justify-between flex-wrap gap-2 mb-3">'
      + '<div class="min-w-0">'
      + '<div class="font-semibold text-sm sm:text-base">' + esc(displayName) + (isMulti ? '' : ' (' + esc(displayCode) + ')') + newTag + multiTag + issuerSizeBadge + '</div>'
      + '<div class="text-xs text-slate-400 mt-0.5">' + headerInfo + '</div>'
      + concentrationLine
      + newNote
      + '</div></div>'
      + '<div class="text-xs text-slate-500 mb-2">💡 點擊欄位標題排序</div>'
      + '<div class="overflow-x-auto -mx-3 sm:mx-0">'
      + '<table class="w-full text-sm">'

      + '<th class="px-2 py-2 text-left">#</th>'
      + thEtf('股票', 'name', 'left')
      + thEtf(weightColLabel, 'weight')
      + thEtf('前日', 'prev_lots')
      + thEtf('今日', 'lots')
      + thEtf('增減', 'diff')
      + thEtf('收盤', 'price')
      + thEtf('市值', 'mv')
      + '<th class="px-2 py-2 text-center">歷史</th>'
      + '</tr></thead>'
      + '<tbody class="divide-y divide-slate-800">' + rowsHtml + '</tbody>'
      + '</table></div></div>';
  }

  return '<h2 class="text-base sm:text-lg font-semibold mb-2 sm:mb-3">ETF 明細</h2>'
    + '<div class="grid grid-cols-4 sm:flex sm:flex-wrap gap-1.5 sm:gap-2 mb-3">' + etfBtnsHtml + '</div>'
    + groupShortcutsHtml
    + multiHintHtml
    + bodyHtml;
}

function bindEtf() {
  document.querySelectorAll('.etf-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      const code = btn.dataset.etf;
      if (etfMultiSelectMode) {
        if (!selectedEtfMulti) selectedEtfMulti = [code];
        else {
          const idx = selectedEtfMulti.indexOf(code);
          if (idx >= 0) selectedEtfMulti.splice(idx, 1);
          else selectedEtfMulti.push(code);
        }
      } else {
        selectedEtf = code;
        selectedEtfMulti = null;
      }
      render();
    });
  });
}

function toggleEtfMultiMode() {
  if (etfMultiSelectMode) {
    etfMultiSelectMode = false;
    if (!selectedEtfMulti || selectedEtfMulti.length === 0) selectedEtfMulti = null;
    else if (selectedEtfMulti.length === 1) {
      selectedEtf = selectedEtfMulti[0];
      selectedEtfMulti = null;
    }
  } else {
    etfMultiSelectMode = true;
    if (!selectedEtfMulti) selectedEtfMulti = selectedEtf ? [selectedEtf] : [];
  }
  render();
}

function clearEtfMulti() {
  selectedEtfMulti = [];
  if (!etfMultiSelectMode) selectedEtfMulti = null;
  render();
}

function selectAllEtfMulti() {
  selectedEtfMulti = Object.keys(DATA.today);
  render();
}

// 🆕 多選模式下的群組快速套用
function applyEtfMultiGroup(groupType, groupKey) {
  let codes;
  if (groupType === 'size') codes = getEtfsBySize(groupKey);
  else if (groupType === 'issuer') codes = getEtfsByIssuer(groupKey);
  else codes = [];
  codes = codes.filter(function(c) { return DATA.today[c]; });
  if (codes.length === 0) return;
  selectedEtfMulti = codes;
  render();
}

    dateSelectorHtml = '<div class="bg-slate-900 border border-slate-800 rounded-lg p-2 sm:p-3 mb-2 flex items-center gap-2 text-xs sm:text-sm">'
      + '<span class="text-slate-400">📅 想查歷史日期? </span>'
      + '<button onclick="ensureHistoryForStockQuery()" class="px-2 py-1 rounded bg-amber-600 hover:bg-amber-500 text-white">' + (stockQueryLoading ? '載入中...' : '載入歷史') + '</button>'
      + '<span class="text-slate-500">(顯示最新資料 ' + esc(DATA.today_date) + ')</span>'
      + '</div>';
  }

  const queryData = getStockQuerySnap(stockQueryDate);
  let querySnapshot, queryPrices, queryDateLabel, queryPrevSnapshot, queryPrevLabel;
  if (queryData) {
    querySnapshot = queryData.snap.today || {};
    queryPrices = queryData.snap.prices || {};
    queryDateLabel = stockQueryDate || DATA.today_date;
    queryPrevSnapshot = (queryData.prevSnap && queryData.prevSnap.today) || {};
    queryPrevLabel = queryData.prevDate;
  } else {
    querySnapshot = DATA.today || {};
    queryPrices = DATA.prices || {};
    queryDateLabel = DATA.today_date;
    queryPrevSnapshot = DATA.prev || {};
    queryPrevLabel = DATA.prev_date;
  }

  const allEtfCodes = Object.keys(querySnapshot);
  let activeEtfCodes;
  if (!stockQueryEtfFilter) activeEtfCodes = null;
  else if (typeof stockQueryEtfFilter === 'string') activeEtfCodes = [stockQueryEtfFilter];
  else if (Array.isArray(stockQueryEtfFilter)) activeEtfCodes = stockQueryEtfFilter;
  else activeEtfCodes = null;

  let filteredSnapshot = querySnapshot;
  let filteredPrevSnapshot = queryPrevSnapshot;
  if (activeEtfCodes) {
    filteredSnapshot = {};
    filteredPrevSnapshot = {};
    activeEtfCodes.forEach(function(ec) {
      if (querySnapshot[ec]) filteredSnapshot[ec] = querySnapshot[ec];
      if (queryPrevSnapshot[ec]) filteredPrevSnapshot[ec] = queryPrevSnapshot[ec];
    });
  }

  // 🆕 規模/投信群組快捷鈕
  let groupShortcutsHtml = '';
  if (!stockQueryCustomMode) {
    let sizeBtnsHtml = '';
    Object.keys(SIZE_LABELS).forEach(function(sz) {
      const codes = getEtfsBySize(sz).filter(function(c) { return DATA.today[c]; });
      if (codes.length === 0) return;
      const isActive = Array.isArray(stockQueryEtfFilter)
        && stockQueryEtfFilter.length === codes.length
        && codes.every(function(c) { return stockQueryEtfFilter.indexOf(c) !== -1; });
      const cls = isActive ? 'bg-amber-600 text-white' : 'bg-amber-700/30 hover:bg-amber-600/60 text-amber-100';
      sizeBtnsHtml += '<button onclick="applyStockQueryGroup(\'size\',\'' + sz + '\')" class="px-2 py-1 text-xs rounded ' + cls + ' whitespace-nowrap">'
        + SIZE_LABELS[sz].label + ' <span class="opacity-70">(' + codes.length + ')</span></button>';
    });
    let issuerBtnsHtml = '';
    getMultiIssuers().forEach(function(iss) {
      const codes = getEtfsByIssuer(iss).filter(function(c) { return DATA.today[c]; });
      if (codes.length < 2) return;
      const isActive = Array.isArray(stockQueryEtfFilter)
        && stockQueryEtfFilter.length === codes.length
        && codes.every(function(c) { return stockQueryEtfFilter.indexOf(c) !== -1; });
      const cls = isActive ? 'bg-purple-600 text-white' : 'bg-purple-700/30 hover:bg-purple-600/60 text-purple-100';
      issuerBtnsHtml += '<button onclick="applyStockQueryGroup(\'issuer\',\'' + esc(iss) + '\')" class="px-2 py-1 text-xs rounded ' + cls + ' whitespace-nowrap">'
        + '🏦 ' + esc(iss) + '系 <span class="opacity-70">(' + codes.length + ')</span></button>';
    });
    if (sizeBtnsHtml || issuerBtnsHtml) {
      groupShortcutsHtml = '<div class="bg-slate-900 border border-slate-800 rounded-lg p-2 sm:p-3 mb-2">'
        + '<div class="text-xs text-slate-400 mb-2">⚡ 群組快捷:</div>'
        + (sizeBtnsHtml ? '<div class="flex flex-wrap gap-1.5 mb-2"><span class="text-xs text-slate-500 self-center mr-1">規模:</span>' + sizeBtnsHtml + '</div>' : '')
        + (issuerBtnsHtml ? '<div class="flex flex-wrap gap-1.5"><span class="text-xs text-slate-500 self-center mr-1">投信:</span>' + issuerBtnsHtml + '</div>' : '')
        + '</div>';
    }
  }

  const allEtfCodesSorted = Object.keys(DATA.today).sort();
  let etfFilterHtml;
  if (stockQueryCustomMode) {
    let checklistHtml = '';
    allEtfCodesSorted.forEach(function(k) {
      const checked = stockQueryCustomSelected.indexOf(k) !== -1;
      const etfName = (DATA.today[k] && DATA.today[k].name) || k;
      checklistHtml += '<label class="flex items-center gap-2 px-2 py-1 rounded hover:bg-slate-800/50 cursor-pointer text-xs">'
        + '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="toggleStockQueryCustomEtf(\'' + esc(k) + '\')" class="cursor-pointer">'
        + '<span class="text-slate-300">' + esc(k) + '</span>'
        + '<span class="text-slate-500 truncate">' + esc(etfName) + '</span>'
        + '</label>';
    });
    etfFilterHtml = '<div class="bg-slate-900 border border-slate-800 rounded-lg p-2 sm:p-3 mb-3">'
      + '<div class="flex flex-wrap items-center gap-2 mb-2 text-xs sm:text-sm">'
      + '<span class="text-slate-400">✏️ 自選 ETF 組合 (' + stockQueryCustomSelected.length + ' / ' + allEtfCodesSorted.length + ')</span>'
      + '<button onclick="selectAllStockQueryCustom()" class="px-2 py-0.5 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs">全選</button>'
      + '<button onclick="clearStockQueryCustom()" class="px-2 py-0.5 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs">全不選</button>'
      + '<button onclick="applyStockQueryCustom()" class="px-2 py-0.5 rounded bg-amber-600 hover:bg-amber-500 text-white text-xs ml-auto">套用</button>'
      + '<button onclick="cancelStockQueryCustom()" class="px-2 py-0.5 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs">取消</button>'
      + '</div>'
      + '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-1 max-h-48 overflow-y-auto bg-slate-950/50 p-2 rounded">' + checklistHtml + '</div>'
      + '</div>';
  } else {
    const isAll = !stockQueryEtfFilter;
    const isCustom = Array.isArray(stockQueryEtfFilter);
    const isSingle = typeof stockQueryEtfFilter === 'string';
    const allBtnCls = isAll ? 'bg-amber-600 text-white' : 'bg-slate-800 text-slate-300 hover:bg-slate-700';
    const customBtnCls = isCustom ? 'bg-sky-600 text-white' : 'bg-slate-800 text-slate-300 hover:bg-slate-700';
    let singleOptions = '<option value="__placeholder__">— 選擇單檔 ETF —</option>';
    allEtfCodesSorted.forEach(function(k) {
      const sel = isSingle && stockQueryEtfFilter === k ? 'selected' : '';
      const etfName = (DATA.today[k] && DATA.today[k].name) || k;
      singleOptions += '<option value="' + esc(k) + '" ' + sel + '>' + esc(k) + ' ' + esc(etfName) + '</option>';
    });
    etfFilterHtml = '<div class="bg-slate-900 border border-slate-800 rounded-lg p-2 sm:p-3 mb-3">'
      + '<div class="flex flex-wrap items-center gap-2 text-xs sm:text-sm">'
      + '<span class="text-slate-400">📊 ETF 視角:</span>'
      + '<button onclick="setStockQueryEtfFilter(\'__all__\')" class="px-3 py-1 rounded ' + allBtnCls + '">全部 ETF 合計</button>'
      + '<button onclick="setStockQueryEtfFilter(\'__custom__\')" class="px-3 py-1 rounded ' + customBtnCls + '">✏️ 自選組合' + (isCustom ? ' (' + stockQueryEtfFilter.length + ')' : '') + '</button>'
      + '<span class="text-slate-500 mx-1">|</span>'
      + '<span class="text-slate-400 text-xs">單檔:</span>'
      + '<select onchange="if (this.value !== \'__placeholder__\') setStockQueryEtfFilter(this.value)" class="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-slate-100 text-xs sm:text-sm">' + singleOptions + '</select>'
      + '</div>';
    if (isCustom && stockQueryEtfFilter.length > 0) {
      etfFilterHtml += '<div class="text-xs text-slate-500 mt-2">'
        + '已選: ' + stockQueryEtfFilter.map(esc).join(', ')
        + ' <button onclick="setStockQueryEtfFilter(\'__custom__\')" class="ml-2 text-amber-400 hover:text-amber-300 underline">編輯</button>'
        + '</div>';
    } else if (isSingle) {
      const etfName = (DATA.today[stockQueryEtfFilter] && DATA.today[stockQueryEtfFilter].name) || '';
      etfFilterHtml += '<div class="text-xs text-amber-400 mt-2">只看 ' + esc(stockQueryEtfFilter) + ' ' + esc(etfName) + ' 的持股</div>';
    }
    etfFilterHtml += '</div>';
  }

  const filteredAgg = aggregate(filteredSnapshot, queryPrices);
  const filteredPrevAgg = aggregate(filteredPrevSnapshot, queryPrices);

  const all = Object.values(filteredAgg);
  const filtered = stockSearch.trim()
    ? all.filter(function(s) { return s.code.indexOf(stockSearch) !== -1 || s.name.indexOf(stockSearch) !== -1; })
    : all.sort(function(a, b) { return b.total_lots - a.total_lots; }).slice(0, 30);

  let listHtml = '';
  filtered.forEach(function(s) {
    listHtml += '<button data-code="' + esc(s.code) + '" class="stk-btn w-full px-3 sm:px-4 py-2 text-left flex items-center justify-between gap-2 hover:bg-slate-800/50 ' + (selectedStock === s.code ? 'bg-slate-800' : '') + '">'
      + '<div class="min-w-0"><div class="text-slate-200 text-sm truncate">' + esc(s.name) + '</div><div class="text-xs text-slate-500">' + esc(s.code) + ' · ' + s.etf_count + '檔持有</div></div>'
      + '<div class="text-right flex-shrink-0"><div class="text-sm num">' + fmt(s.total_lots) + '張</div><div class="text-xs text-amber-400 num">' + fmtM(s.market_value) + '</div></div>'
      + '</button>';
  });
  if (!filtered.length) listHtml = '<div class="p-8 text-center text-sm text-slate-500">無符合</div>';

  let listTitle;
  if (stockSearch.trim()) listTitle = '符合 ' + filtered.length + ' 檔';
  else if (typeof stockQueryEtfFilter === 'string') listTitle = stockQueryEtfFilter + ' 持股 TOP 30';
  else if (Array.isArray(stockQueryEtfFilter)) listTitle = '自選 ' + stockQueryEtfFilter.length + ' 檔合計持股 TOP 30';
  else listTitle = '合計持股 TOP 30';

  const detail = selectedStock && filteredAgg[selectedStock];
  const prevDetail = selectedStock && filteredPrevAgg[selectedStock];

  let detailHtml;
  if (!detail) {
    if (selectedStock) {
      const stkName = todayAgg[selectedStock] ? todayAgg[selectedStock].name : selectedStock;
      let reason;
      if (typeof stockQueryEtfFilter === 'string') reason = esc(stockQueryEtfFilter) + ' 在 ' + esc(queryDateLabel) + ' 沒有持有此股';
      else if (Array.isArray(stockQueryEtfFilter)) reason = '自選 ' + stockQueryEtfFilter.length + ' 檔在 ' + esc(queryDateLabel) + ' 都沒有持有此股';
      else reason = esc(stkName) + ' 在 ' + esc(queryDateLabel) + ' 沒有任何 ETF 持有';
      detailHtml = '<div class="text-center py-12">'
        + '<div class="text-amber-400 mb-2">⚠️ ' + reason + '</div>'
        + '<div class="text-xs text-slate-500">換個視角、日期或股票試試</div>'
        + '</div>';
    } else {
      detailHtml = '<div class="text-center text-sm text-slate-500 py-12">選擇左側個股查看詳情</div>';
    }
  } else {
    const prevLots = (prevDetail && prevDetail.total_lots) || 0;
    const diff = detail.total_lots - prevLots;
    const diffColor = diff > 0 ? 'text-emerald-400' : (diff < 0 ? 'text-rose-400' : '');
    const dateBadge = stockQueryDate
      ? ' <span class="text-xs bg-amber-600/30 text-amber-300 px-2 py-0.5 rounded ml-1">' + esc(queryDateLabel) + '</span>'
      : '';
    let etfBadge = '';
    if (typeof stockQueryEtfFilter === 'string') etfBadge = ' <span class="text-xs bg-sky-600/30 text-sky-300 px-2 py-0.5 rounded ml-1">' + esc(stockQueryEtfFilter) + ' 視角</span>';
    else if (Array.isArray(stockQueryEtfFilter)) etfBadge = ' <span class="text-xs bg-sky-600/30 text-sky-300 px-2 py-0.5 rounded ml-1">自選 ' + stockQueryEtfFilter.length + ' 檔視角</span>';
    const todayLabel = stockQueryDate ? '當日合計' : '今日合計';
    const prevLabel = queryPrevLabel ? '前一筆 (' + esc(queryPrevLabel) + ')' : '前日合計';
    const mvLabel = stockQueryEtfFilter ? '篩選後市值' : '合計市值';
    const etfListLabel = (typeof stockQueryEtfFilter === 'string')
      ? '此 ETF 對該股票:'
      : (Array.isArray(stockQueryEtfFilter)
          ? '自選 ' + stockQueryEtfFilter.length + ' 檔的持股 (實際持有 ' + detail.etfs.length + ' 檔):'
          : '持有此股的 ETF (' + detail.etfs.length + '檔):');

    let etfRowsHtml = '';
    detail.etfs.sort(function(a, b) { return b.lots - a.lots; }).forEach(function(e) {
      const isNew = !stockQueryDate && NEW_ETFS.indexOf(e.etf) !== -1;
      const prevEtfHoldings = stockQueryDate
        ? ((queryData && queryData.prevSnap && queryData.prevSnap.today && queryData.prevSnap.today[e.etf] && queryData.prevSnap.today[e.etf].holdings) || [])
        : ((DATA.prev && DATA.prev[e.etf] && DATA.prev[e.etf].holdings) || []);
      const pv = prevEtfHoldings.find(function(h) { return h.code === detail.code; });
      const d = e.lots - (pv ? pv.lots : 0);
      const dColor = isNew ? 'text-amber-400' : (d > 0 ? 'text-emerald-400' : (d < 0 ? 'text-rose-400' : 'text-slate-500'));
      const dText = isNew ? '首日' : (d !== 0 ? (d > 0 ? '+' : '') + fmt(d) : '—');
      etfRowsHtml += '<div class="flex items-center justify-between bg-slate-800/50 rounded px-2 py-1.5 text-xs sm:text-sm ' + (isNew ? 'border-l-2 border-amber-500' : '') + ' gap-2">'
        + '<div class="min-w-0">'
        + '<span class="text-slate-300">' + esc(e.etf_name) + '</span>'
        + '<span class="text-xs text-slate-500 ml-1">' + esc(e.etf) + '</span>'
        + (isNew ? '<span class="text-[10px] bg-amber-600/30 text-amber-300 px-1 rounded ml-1">新</span>' : '')
        + '</div>'
        + '<div class="flex items-center gap-2 text-xs flex-shrink-0">'
        + '<span class="text-slate-400">' + e.weight + '%</span>'
        + '<span class="num text-slate-200">' + fmt(e.lots) + '張</span>'
        + '<span class="num font-semibold w-14 sm:w-16 text-right ' + dColor + '">' + dText + '</span>'
        + '</div></div>';
    });

    detailHtml = '<div class="flex items-center justify-between mb-3 gap-2">'
      + '<div class="min-w-0">'
      + '<div class="font-bold text-base sm:text-lg truncate">' + esc(detail.name) + dateBadge + etfBadge + '</div>'
      + '<div class="text-xs text-slate-400">' + esc(detail.code) + ' · 收盤 ' + (detail.price ? fmt(detail.price, 2) : 'N/A') + '</div>'
      + '</div>'
      + '<div class="text-right flex-shrink-0"><div class="text-xs text-slate-500">' + mvLabel + '</div><div class="text-amber-400 font-bold">' + fmtM(detail.market_value) + '</div></div>'
      + '</div>'
      + '<div class="grid grid-cols-3 gap-2 mb-4 text-center">'
      + '<div class="bg-slate-800 rounded p-2"><div class="text-xs text-slate-400">' + todayLabel + '</div><div class="num font-semibold text-sm">' + fmt(detail.total_lots) + '張</div></div>'
      + '<div class="bg-slate-800 rounded p-2"><div class="text-xs text-slate-400">' + prevLabel + '</div><div class="num text-sm">' + fmt(prevLots) + '張</div></div>'
      + '<div class="bg-slate-800 rounded p-2"><div class="text-xs text-slate-400">變動</div><div class="num font-semibold text-sm ' + diffColor + '">' + (diff > 0 ? '+' : '') + fmt(diff) + '</div></div>'
      + '</div>'
      + '<div class="text-xs text-slate-400 mb-2">' + etfListLabel + '</div>'
      + '<div class="space-y-1">' + etfRowsHtml + '</div>';
  }

  return '<h2 class="text-base sm:text-lg font-semibold mb-2 sm:mb-3">個股查詢</h2>'
    + dateSelectorHtml
    + groupShortcutsHtml
    + etfFilterHtml
    + '<input id="stock-search" value="' + esc(stockSearch) + '" placeholder="輸入股票代號或名稱 (如 2330 或 台積電)" class="w-full md:max-w-md bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm mb-4 focus:outline-none focus:border-amber-500">'
    + '<div class="grid md:grid-cols-2 gap-3 sm:gap-4">'
    + '<div class="bg-slate-900 border border-slate-800 rounded-lg overflow-hidden max-h-[60vh] md:max-h-[70vh] overflow-y-auto">'
    + '<div class="px-4 py-2 text-xs text-slate-400 border-b border-slate-800 sticky top-0 bg-slate-900">' + esc(listTitle) + '</div>'
    + '<div class="divide-y divide-slate-800">' + listHtml + '</div>'
    + '</div>'
    + '<div class="bg-slate-900 border border-slate-800 rounded-lg p-3 sm:p-4">' + detailHtml + '</div>'
    + '</div>';
}

function bindStock(todayAgg, prevAgg) {
  const inp = document.getElementById('stock-search');
  if (inp) inp.addEventListener('input', function(e) {
    stockSearch = e.target.value;
    render();
    setTimeout(function() {
      const i = document.getElementById('stock-search');
      if (i) { i.focus(); i.setSelectionRange(stockSearch.length, stockSearch.length); }
    }, 0);
  });
  document.querySelectorAll('.stk-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { selectedStock = btn.dataset.code; render(); });
  });
}

document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() { currentTab = btn.dataset.tab; render(); });
});

function loadData() {
  fetch('./latest.json?t=' + Date.now())
    .then(function(r) { if (!r.ok) throw new Error('404'); return r.json(); })
    .then(function(d) { DATA = d; render(); })
    .catch(function() { DATA = null; render(); });
}
</script>

</body>
</html>
