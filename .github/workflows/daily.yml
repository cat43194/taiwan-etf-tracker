name: Daily ETF Fetch
on:
  schedule:
    # 避開整點 (GitHub Actions 整點高峰延遲嚴重)
    - cron: '37 13 * * *'   # 台灣 21:37
    - cron: '17 14 * * *'   # 台灣 22:17
    - cron: '47 14 * * *'   # 台灣 22:47
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run fetcher
        run: python fetch_etf_holdings.py
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/ latest.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily snapshot $(date -u '+%Y-%m-%d')"
          # 最多 3 次 push, 失敗就 pull --rebase 後重試
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, pulling and retrying..."
            git pull --rebase origin main || true
            sleep 5
          done
          echo "Push failed after 3 attempts"
          exit 1
