name: Daily ETF Fetch

on:
  schedule:
    # 台灣時間 20:00 = UTC 12:00
    - cron: '0 12 * * *'    # 台灣 20:00
    - cron: '20 12 * * *'   # 台灣 20:20
    - cron: '45 12 * * *'   # 台灣 20:45
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetcher
        run: python fetch_etf_holdings.py

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/ latest.json
          git diff --staged --quiet || git commit -m "Daily snapshot $(date -u '+%Y-%m-%d')"
          git push
